<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Central</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg:           #F7F7F8;
    --surface:      #FFFFFF;
    --surface-2:    #FAFAFA;
    --hover:        #F4F4F5;
    --border:       #ECECEE;
    --border-strong:#D4D4D8;
    --text:         #18181B;
    --text-soft:    #52525B;
    --text-muted:   #A1A1AA;
    --text-faint:   #D4D4D8;
    --accent:       #4F46E5;
    --accent-hover: #4338CA;
    --accent-soft:  #EEF2FF;
    --accent-text:  #4338CA;
    --danger:       #DC2626;
    --danger-soft:  #FEF2F2;

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --r-pill: 999px;

    --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
    --shadow-md: 0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
    --shadow-pop: 0 8px 24px rgba(15,23,42,.12), 0 2px 4px rgba(15,23,42,.06);

    --ease: cubic-bezier(.2,.8,.2,1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-feature-settings: "cv11","ss01","ss03";
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  button, input, select, textarea { font-family: inherit; color: inherit; }
  button { cursor: pointer; background: none; border: none; padding: 0; }
  textarea { resize: none; }

  /* Card */
  .card {
    background: var(--surface);
    border-radius: var(--r-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }

  /* Focus ring */
  .focusable:focus-visible,
  button:focus-visible,
  input:focus-visible,
  textarea:focus-visible,
  select:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: var(--r-sm);
  }

  /* Drag */
  .grip {
    color: var(--text-faint);
    cursor: grab;
    user-select: none;
    line-height: 1;
    padding: 4px;
    border-radius: 4px;
    transition: color .12s, background .12s;
  }
  .grip:hover { color: var(--text-soft); background: var(--hover); }
  .grip:active { cursor: grabbing; }
  .drop-before { box-shadow: inset 0 2px 0 0 var(--accent); }
  .drop-after  { box-shadow: inset 0 -2px 0 0 var(--accent); }
  .drop-into   { background: var(--accent-soft) !important; outline: 1.5px dashed var(--accent); outline-offset: -2px; border-radius: var(--r-md); }
  .ghost { opacity: .35; }

  /* Icon button */
  .iconbtn {
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    border-radius: var(--r-sm);
    transition: background .12s, color .12s;
  }
  .iconbtn:hover { background: var(--hover); color: var(--text); }
  .iconbtn.danger:hover { background: var(--danger-soft); color: var(--danger); }
  .iconbtn svg { width: 14px; height: 14px; }

  /* Header chip / button */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: var(--r-pill);
    font-size: 11.5px; font-weight: 600;
    background: var(--hover);
    color: var(--text-soft);
    transition: background .12s, color .12s;
    white-space: nowrap;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chip:hover { background: var(--border); }
  .chip.ghost-chip {
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: var(--text-muted);
    opacity: 0;
    transition: opacity .12s;
  }
  .row:hover .chip.ghost-chip { opacity: 1; }
  .chip.ghost-chip:hover { color: var(--text-soft); border-color: var(--text-muted); }

  /* Status pill — variants set inline */
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px 3px 8px;
    border-radius: var(--r-pill);
    font-size: 11px; font-weight: 600;
    transition: filter .12s, transform .12s;
    line-height: 1.4;
    white-space: nowrap;
  }
  .status-pill:hover { filter: brightness(.97); }
  .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border-radius: var(--r-md);
    font-size: 12.5px; font-weight: 600;
    background: var(--surface);
    color: var(--text-soft);
    border: 1px solid var(--border);
    transition: background .12s, color .12s, border-color .12s;
  }
  .btn:hover { background: var(--hover); color: var(--text); }
  .btn-primary {
    background: var(--text);
    color: var(--surface);
    border-color: var(--text);
  }
  .btn-primary:hover { background: #27272A; color: var(--surface); }
  .btn-ghost {
    background: transparent;
    border: none;
    color: var(--text-soft);
    padding: 5px 10px;
    font-weight: 600;
    border-radius: var(--r-sm);
  }
  .btn-ghost:hover { background: var(--hover); color: var(--text); }

  /* Inline input */
  .inline-input {
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    padding: 4px 6px;
    border-radius: var(--r-sm);
    font-size: 13px;
    color: var(--text);
    outline: none;
    font-family: inherit;
    transition: background .12s, border-color .12s;
  }
  .inline-input:hover { background: var(--surface-2); }
  .inline-input:focus { background: var(--surface); border-color: var(--border-strong); }
  textarea.inline-input { resize: none; overflow: hidden; line-height: 1.5; }

  /* Section label */
  .section-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .field-label { display: block; font-size: 10.5px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .08em; }
  .field-input {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    font-size: 13px; color: var(--text); outline: none;
    background: var(--surface);
    transition: border-color .12s;
  }
  .field-input:focus { border-color: var(--accent); }

  /* Row */
  .row {
    display: grid;
    grid-template-columns: 22px 110px 1fr auto 28px;
    column-gap: 10px;
    align-items: start;
    padding: 6px 6px;
    border-radius: var(--r-md);
    position: relative;
    transition: background .12s;
  }
  .row:hover { background: var(--surface-2); }
  .row .grip, .row .row-actions { opacity: 0; transition: opacity .12s; }
  .row:hover .grip, .row:hover .row-actions { opacity: 1; }
  .row.is-dragging { background: var(--surface-2); }

  /* Area body */
  .area-body { padding-left: 12px; border-left: 2px solid var(--border); margin-left: 6px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 10px 16px;
    border-radius: var(--r-md);
    font-size: 12.5px; font-weight: 600;
    background: var(--text); color: var(--surface);
    box-shadow: var(--shadow-pop);
    opacity: 0; transform: translateY(8px);
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    z-index: 9999;
  }
  .toast.show { opacity: 1; transform: none; }
  .toast.err { background: var(--danger); }

  /* Popover */
  .popover {
    position: absolute;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-pop);
    padding: 4px;
    min-width: 180px;
    animation: pop .14s var(--ease);
  }
  @keyframes pop { from { opacity: 0; transform: translateY(-4px) scale(.98); } to { opacity: 1; transform: none; } }
  .popover-item {
    display: flex; align-items: center; gap: 8px;
    width: 100%;
    padding: 7px 9px;
    border-radius: var(--r-sm);
    font-size: 12.5px;
    color: var(--text);
    text-align: left;
    font-weight: 500;
    transition: background .1s;
  }
  .popover-item:hover { background: var(--hover); }
  .popover-item.active { background: var(--accent-soft); color: var(--accent-text); font-weight: 600; }

  /* Chevron rotation */
  .chev { transition: transform .15s var(--ease); }
  .chev.open { transform: rotate(90deg); }

  /* Layout */
  .container { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }

  /* Loader */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .9s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ============================================================
   CONFIG
   ============================================================ */
const WEBHOOK_URL = "https://synchrosocial.app.n8n.cloud/webhook/project-central";
const SHEET_URL   = "https://docs.google.com/spreadsheets/d/1ZAGZBMoT1M3i9DndmhNwHurx6iW3i9ESXiMmrPvCB38/edit";
const STORAGE_KEY = "project-central:v3";
const LEGACY_STORAGE_KEY = "project-central:v2";

const PROJECT_STATUSES = ["On track","At risk","Blocked","Shipped"];
const PROJECT_STATUS_META = {
  "On track": { bg:"#ECFDF5", text:"#047857", dot:"#10B981" },
  "At risk":  { bg:"#FFFBEB", text:"#B45309", dot:"#F59E0B" },
  "Blocked":  { bg:"#FEF2F2", text:"#B91C1C", dot:"#EF4444" },
  "Shipped":  { bg:"#F5F3FF", text:"#6D28D9", dot:"#8B5CF6" },
};

const ITEM_STATUSES = ["done","in_progress","waiting","pending","to_plan","blocker"];
const ITEM_STATUS_META = {
  done:        { label: "Done",        bg:"#ECFDF5", text:"#047857", dot:"#10B981" },
  in_progress: { label: "In progress", bg:"#EFF6FF", text:"#1D4ED8", dot:"#3B82F6" },
  waiting:     { label: "Waiting",     bg:"#FFFBEB", text:"#B45309", dot:"#F59E0B" },
  pending:     { label: "Pending",     bg:"#F4F4F5", text:"#52525B", dot:"#A1A1AA" },
  to_plan:     { label: "To plan",     bg:"#FAFAF9", text:"#78716C", dot:"#D4D4D8" },
  blocker:     { label: "Blocker",     bg:"#FEF2F2", text:"#B91C1C", dot:"#EF4444" },
};

const SECTIONS = [
  { key: "whatsBeenDone", label: "What's been done", emptyHint: "Nothing logged yet. Add an area to start tracking what's shipped." },
  { key: "workingOnNow",  label: "Working on now",   emptyHint: "Nothing in flight. Add an area for work happening now." },
  { key: "blockers",      label: "Blockers / need from you", emptyHint: "No blockers. Add an area for things waiting on someone else." },
];

/* ============================================================
   ICONS (inline SVG)
   ============================================================ */
const Icon = {
  Chevron: (props) => (
    <svg viewBox="0 0 16 16" fill="none" {...props}>
      <path d="M6 4l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  ),
  Plus: (props) => (
    <svg viewBox="0 0 16 16" fill="none" {...props}>
      <path d="M8 3.5v9M3.5 8h9" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  ),
  X: (props) => (
    <svg viewBox="0 0 16 16" fill="none" {...props}>
      <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  ),
  Trash: (props) => (
    <svg viewBox="0 0 16 16" fill="none" {...props}>
      <path d="M3 4.5h10M6.5 7.5v4M9.5 7.5v4M4.5 4.5l.5 8a1 1 0 001 1h4a1 1 0 001-1l.5-8M6 4.5V3a.5.5 0 01.5-.5h3a.5.5 0 01.5.5v1.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  ),
  Check: (props) => (
    <svg viewBox="0 0 16 16" fill="none" {...props}>
      <path d="M3.5 8.5l3 3 6-7" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  ),
  Grip: (props) => (
    <svg viewBox="0 0 16 16" fill="currentColor" {...props}>
      <circle cx="6" cy="4" r="1.1"/><circle cx="10" cy="4" r="1.1"/>
      <circle cx="6" cy="8" r="1.1"/><circle cx="10" cy="8" r="1.1"/>
      <circle cx="6" cy="12" r="1.1"/><circle cx="10" cy="12" r="1.1"/>
    </svg>
  ),
  Sheet: (props) => (
    <svg viewBox="0 0 16 16" fill="none" {...props}>
      <rect x="2.5" y="2.5" width="11" height="11" rx="1.5" stroke="currentColor" strokeWidth="1.3"/>
      <path d="M2.5 6.5h11M2.5 10.5h11M6 2.5v11M10 2.5v11" stroke="currentColor" strokeWidth="1.3"/>
    </svg>
  ),
  Download: (props) => (
    <svg viewBox="0 0 16 16" fill="none" {...props}>
      <path d="M8 2.5v8m0 0L5 7.5m3 3l3-3M3 13h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  ),
};

/* ============================================================
   UTIL
   ============================================================ */
const gid = (prefix="id") => prefix + "-" + Math.random().toString(36).slice(2, 10);
function emptyArea(name="New area") { return { id: gid("a"), name, collapsed: false, items: [] }; }
function emptyItem(status="pending") { return { id: gid("i"), text: "", status, owner: "" }; }
function emptyProject() {
  return {
    id: gid("p"), name: "New project", status: "On track",
    nextMilestone: "", eta: "", sortOrder: 0,
    whatsBeenDone: [], workingOnNow: [], blockers: [],
  };
}

/* ============================================================
   Legacy text → structured  (and "looks like owner" heuristic)
   ============================================================ */
const ITEM_STATUS_FROM_MARKER = {
  "✓": "done", "○": "in_progress", "⏸": "waiting",
  "→": "in_progress", "·": "pending", "…": "to_plan", "•": "pending",
};
const TAG_TO_STATUS = {
  "DONE": "done", "WAITING": "waiting", "PENDING": "pending",
  "IN PROGRESS": "in_progress", "TO PLAN": "to_plan", "BLOCKER": "blocker",
};

function looksLikeOwner(s) {
  if (!s) return false;
  const t = s.trim();
  if (!t || t.length > 30) return false;
  if (/[.!?]$/.test(t)) return false;
  if (/\.\s/.test(t)) return false;
  // disallow obvious sentence words
  if (/^(via|for|the|and|or|on|in|at|with|via|every|each)\b/i.test(t)) return false;
  return true;
}

function stripMdEscapes(s) { return s.replace(/\\([\[\]\\_*])/g, "$1"); }

function splitOwner(text) {
  // Walk from rightmost " — " backward; the first chunk that "looks like an owner" wins.
  const parts = text.split(/\s+—\s+/);
  if (parts.length < 2) return { text, owner: "" };
  for (let i = parts.length - 1; i >= 1; i--) {
    const candidate = parts.slice(i).join(" — ").trim();
    if (looksLikeOwner(candidate)) {
      return { text: parts.slice(0, i).join(" — ").trim(), owner: candidate };
    }
  }
  return { text, owner: "" };
}

function parseSectionText(text) {
  if (!text || typeof text !== "string") return [];
  const lines = text
    .split(/\r?\n|(?:[ \t]{3,})/g)
    .map(l => stripMdEscapes(l).trim())
    .filter(Boolean);
  if (!lines.length) return [];

  const areas = [];
  let current = null;

  for (const raw of lines) {
    let line = raw;
    let status = null;

    const first = line.charAt(0);
    if (ITEM_STATUS_FROM_MARKER[first]) {
      status = ITEM_STATUS_FROM_MARKER[first];
      line = line.slice(1).trim();
    }
    const tagMatch = line.match(/^\[(DONE|WAITING|PENDING|IN PROGRESS|TO PLAN|BLOCKER)\]\s*/i);
    if (tagMatch) {
      status = TAG_TO_STATUS[tagMatch[1].toUpperCase()] || status;
      line = line.slice(tagMatch[0].length).trim();
    }

    if (status) {
      const split = splitOwner(line);
      if (!current) { current = emptyArea("Items"); areas.push(current); }
      current.items.push({ id: gid("i"), text: split.text, status, owner: split.owner });
    } else {
      current = emptyArea(line);
      areas.push(current);
    }
  }
  // Drop empty section-divider areas (kept only if last)
  return areas.filter((a, i) => a.items.length > 0 || i === areas.length - 1);
}

function migrateSection(value) {
  if (Array.isArray(value)) return value.map(normalizeArea).map(repairArea);
  if (typeof value === "string") {
    const trimmed = value.trim();
    if (!trimmed) return [];
    if (trimmed.startsWith("[") || trimmed.startsWith("{")) {
      try {
        const parsed = JSON.parse(trimmed);
        if (Array.isArray(parsed)) return parsed.map(normalizeArea).map(repairArea);
      } catch {}
    }
    return parseSectionText(trimmed).map(repairArea);
  }
  return [];
}

function repairArea(a) {
  return { ...a, items: a.items.map(repairItem) };
}
function repairItem(it) {
  // If a previously-saved owner doesn't actually look like an owner (legacy bug),
  // fold it back into the text.
  if (it.owner && !looksLikeOwner(it.owner)) {
    return { ...it, text: (it.text + (it.text ? " — " : "") + it.owner).trim(), owner: "" };
  }
  return it;
}

function normalizeArea(a, i=0) {
  return {
    id: String(a?.id || gid("a")),
    name: String(a?.name ?? `Area ${i+1}`),
    collapsed: Boolean(a?.collapsed),
    items: Array.isArray(a?.items) ? a.items.map(normalizeItem) : [],
  };
}
function normalizeItem(it) {
  return {
    id: String(it?.id || gid("i")),
    text: String(it?.text ?? ""),
    status: ITEM_STATUSES.includes(it?.status) ? it.status : "pending",
    owner: String(it?.owner ?? ""),
  };
}
function normalizeProject(p, i=0) {
  return {
    id: String(p?.id || gid("p")),
    name: String(p?.name || "Untitled"),
    status: PROJECT_STATUSES.includes(p?.status) ? p.status : "On track",
    nextMilestone: String(p?.nextMilestone ?? ""),
    eta: String(p?.eta ?? ""),
    sortOrder: Number(p?.sortOrder) || i + 1,
    whatsBeenDone: migrateSection(p?.whatsBeenDone),
    workingOnNow:  migrateSection(p?.workingOnNow),
    blockers:      migrateSection(p?.blockers),
  };
}

/* ============================================================
   API
   ============================================================ */
function serializeForSheet(projects) {
  return projects.map(p => ({
    id: p.id, name: p.name, status: p.status,
    nextMilestone: p.nextMilestone, eta: p.eta, sortOrder: p.sortOrder,
    whatsBeenDone: JSON.stringify(p.whatsBeenDone || []),
    workingOnNow:  JSON.stringify(p.workingOnNow  || []),
    blockers:      JSON.stringify(p.blockers      || []),
  }));
}
async function apiLoad() {
  const r = await fetch(WEBHOOK_URL, { method: "GET" });
  if (!r.ok) throw new Error("Load failed: " + r.status);
  const d = await r.json();
  return Array.isArray(d.projects) ? d.projects : [];
}
async function apiSave(projects) {
  const r = await fetch(WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ projects: serializeForSheet(projects) }),
  });
  if (!r.ok) throw new Error("Save failed: " + r.status);
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY) ?? localStorage.getItem(LEGACY_STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function saveLocal(projects) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); } catch {}
}

/* ============================================================
   DRAG controller
   ============================================================ */
const DragCtx = React.createContext(null);
function useDragController() {
  const [drag, setDrag] = React.useState(null);
  return [drag, setDrag];
}

/* ============================================================
   Hooks
   ============================================================ */
const { useState, useEffect, useCallback, useRef, useMemo, useContext, useLayoutEffect } = React;

function useOutsideClick(ref, onOutside) {
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) onOutside(); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [ref, onOutside]);
}

function useAutoResize(ref, value) {
  useLayoutEffect(() => {
    const el = ref.current; if (!el) return;
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
  }, [ref, value]);
}

/* ============================================================
   Inline editors
   ============================================================ */
function InlineInput({ value, onChange, placeholder, ariaLabel, style, onEnter }) {
  return (
    <input className="inline-input" type="text" value={value}
      onChange={e=>onChange(e.target.value)}
      placeholder={placeholder} aria-label={ariaLabel} style={style}
      onKeyDown={e=>{ if (e.key === "Enter" && onEnter) { e.preventDefault(); onEnter(); } }}/>
  );
}
function InlineTextarea({ value, onChange, placeholder, ariaLabel, style, onEnter }) {
  const ref = useRef(null);
  useAutoResize(ref, value);
  return (
    <textarea ref={ref} className="inline-input" value={value} rows={1}
      onChange={e=>onChange(e.target.value)}
      placeholder={placeholder} aria-label={ariaLabel} style={style}
      onKeyDown={e=>{
        if (e.key === "Enter" && !e.shiftKey && onEnter) { e.preventDefault(); onEnter(); }
      }}/>
  );
}

/* ============================================================
   Owner chip + popover
   ============================================================ */
function OwnerChip({ value, onChange, suggestions }) {
  const [open, setOpen] = useState(false);
  const [draft, setDraft] = useState(value || "");
  const ref = useRef(null);
  const inputRef = useRef(null);
  useOutsideClick(ref, () => { commit(); });

  useEffect(() => { setDraft(value || ""); }, [value]);
  useEffect(() => { if (open && inputRef.current) inputRef.current.focus(); }, [open]);

  const commit = () => {
    if (!open) return;
    if (draft !== value) onChange(draft.trim());
    setOpen(false);
  };

  const filtered = useMemo(() => {
    const q = draft.toLowerCase().trim();
    return Array.from(new Set(suggestions))
      .filter(s => s && s !== value && (!q || s.toLowerCase().includes(q)))
      .slice(0, 8);
  }, [suggestions, draft, value]);

  return (
    <div ref={ref} style={{position:"relative", justifySelf:"end"}}>
      {value ? (
        <button type="button" className="chip focusable" onClick={()=>setOpen(o=>!o)}
          aria-label={`Owner: ${value}. Click to change.`} title={value}>
          {value}
        </button>
      ) : (
        <button type="button" className="chip ghost-chip focusable" onClick={()=>setOpen(o=>!o)}
          aria-label="Add owner">
          + Owner
        </button>
      )}
      {open && (
        <div className="popover" style={{top:"calc(100% + 4px)", right:0, minWidth:200}}>
          <input ref={inputRef} className="inline-input" value={draft}
            placeholder="Owner name (Me, Kasper, …)"
            onChange={e=>setDraft(e.target.value)}
            onKeyDown={e=>{
              if (e.key === "Enter") { e.preventDefault(); commit(); }
              if (e.key === "Escape") { e.preventDefault(); setDraft(value||""); setOpen(false); }
            }}
            style={{marginBottom:filtered.length?4:0, background:"var(--surface-2)", border:"1px solid var(--border)"}}/>
          {filtered.map(s => (
            <button key={s} type="button" className="popover-item"
              onClick={()=>{ onChange(s); setOpen(false); }}>
              {s}
            </button>
          ))}
          {value && (
            <button type="button" className="popover-item"
              style={{color:"var(--danger)"}}
              onClick={()=>{ onChange(""); setOpen(false); }}>
              <Icon.X/> Clear owner
            </button>
          )}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   Item row
   ============================================================ */
function ItemRow({ projectId, sectionKey, areaId, item, onChange, onDelete, ownerSuggestions }) {
  const [drag, setDrag] = useContext(DragCtx);
  const [dropPos, setDropPos] = useState(null);
  const isSrc = drag?.kind==='item' && drag.itemId === item.id;

  const dragStart = (e) => {
    setDrag({ kind:'item', projectId, sectionKey, areaId, itemId: item.id });
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', item.id); } catch {}
    e.stopPropagation();
  };
  const dragOver = (e) => {
    if (drag?.kind !== 'item') return;
    e.preventDefault(); e.stopPropagation();
    const r = e.currentTarget.getBoundingClientRect();
    setDropPos((e.clientY - r.top) < r.height/2 ? 'before' : 'after');
  };
  const dragLeave = () => setDropPos(null);
  const drop = (e) => {
    if (drag?.kind !== 'item') return;
    e.preventDefault(); e.stopPropagation();
    const pos = dropPos; setDropPos(null);
    window.__pcDrop?.({ targetKind:'item', projectId, sectionKey, areaId, itemId: item.id, position: pos });
  };

  return (
    <div
      draggable
      onDragStart={dragStart}
      onDragOver={dragOver}
      onDragLeave={dragLeave}
      onDrop={drop}
      onDragEnd={()=>{ setDrag(null); setDropPos(null); }}
      className={`row ${isSrc?'ghost is-dragging':''} ${dropPos==='before'?'drop-before':''} ${dropPos==='after'?'drop-after':''}`}>
      <span className="grip" aria-hidden="true" title="Drag to reorder">
        <Icon.Grip style={{width:14, height:14}}/>
      </span>
      <ItemStatusPill value={item.status} onChange={(s)=>onChange({ ...item, status: s })}/>
      <InlineTextarea
        value={item.text}
        onChange={(t)=>onChange({ ...item, text: t })}
        placeholder="Describe this item…"
        ariaLabel="Item description"
        style={{paddingTop:5, paddingBottom:5}}
      />
      <OwnerChip value={item.owner} onChange={(o)=>onChange({ ...item, owner: o })} suggestions={ownerSuggestions}/>
      <div className="row-actions">
        <button type="button" className="iconbtn danger focusable" onClick={onDelete} aria-label="Delete item" title="Delete">
          <Icon.X/>
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   Area block
   ============================================================ */
function AreaBlock({ projectId, sectionKey, area, onChange, onDelete, ownerSuggestions }) {
  const [drag, setDrag] = useContext(DragCtx);
  const [dropPos, setDropPos] = useState(null);
  const isSrc = drag?.kind==='area' && drag.areaId === area.id;

  const dragStart = (e) => {
    setDrag({ kind:'area', projectId, sectionKey, areaId: area.id });
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', area.id); } catch {}
    e.stopPropagation();
  };
  const dragOver = (e) => {
    if (!drag) return;
    e.preventDefault();
    if (drag.kind === 'item' && area.items.length === 0) { setDropPos('into'); return; }
    if (drag.kind !== 'area') return;
    const r = e.currentTarget.getBoundingClientRect();
    setDropPos((e.clientY - r.top) < r.height/2 ? 'before' : 'after');
  };
  const dragLeave = () => setDropPos(null);
  const drop = (e) => {
    if (!drag) return;
    e.preventDefault(); e.stopPropagation();
    const pos = dropPos; setDropPos(null);
    if (drag.kind === 'item' && pos === 'into') {
      window.__pcDrop?.({ targetKind:'area-empty', projectId, sectionKey, areaId: area.id });
    } else if (drag.kind === 'area') {
      window.__pcDrop?.({ targetKind:'area', projectId, sectionKey, areaId: area.id, position: pos });
    }
  };

  const setName = (name) => onChange({ ...area, name });
  const toggleCollapsed = () => onChange({ ...area, collapsed: !area.collapsed });
  const updateItem = (i, updated) => onChange({ ...area, items: area.items.map((it, idx) => idx === i ? updated : it) });
  const deleteItem = (i) => onChange({ ...area, items: area.items.filter((_, idx) => idx !== i) });
  const addItem = () => onChange({ ...area, collapsed: false, items: [...area.items, emptyItem()] });

  const counts = useMemo(() => ({
    done: area.items.filter(i => i.status === "done").length,
    total: area.items.length,
  }), [area.items]);

  return (
    <div
      draggable
      onDragStart={dragStart}
      onDragOver={dragOver}
      onDragLeave={dragLeave}
      onDrop={drop}
      onDragEnd={()=>{ setDrag(null); setDropPos(null); }}
      className={`${isSrc?'ghost':''} ${dropPos==='before'?'drop-before':''} ${dropPos==='after'?'drop-after':''} ${dropPos==='into'?'drop-into':''}`}
      style={{marginTop:8}}>
      <div style={{display:"flex", alignItems:"center", gap:6, padding:"2px 4px"}}>
        <span className="grip" aria-hidden="true" title="Drag to reorder area">
          <Icon.Grip style={{width:12, height:12}}/>
        </span>
        <Caret open={!area.collapsed} onClick={toggleCollapsed}
          label={area.collapsed ? "Expand area" : "Collapse area"}/>
        <InlineInput
          value={area.name}
          onChange={setName}
          placeholder="Area name (e.g. N8N, Email Copy)"
          ariaLabel="Area name"
          style={{fontWeight:600, fontSize:13.5, color:"var(--text)", flex:1, minWidth:0}}
        />
        {counts.total > 0 && (
          <span style={{fontSize:11.5, color:"var(--text-muted)", fontWeight:600, whiteSpace:"nowrap"}}>
            {counts.done}/{counts.total}
          </span>
        )}
        <button type="button" onClick={addItem} className="btn-ghost focusable"
          style={{fontSize:11.5, color:"var(--accent-text)"}}>
          <Icon.Plus style={{width:11, height:11}}/> Item
        </button>
        <button type="button" onClick={onDelete} className="iconbtn danger focusable"
          aria-label="Delete area" title="Delete area">
          <Icon.X/>
        </button>
      </div>
      {!area.collapsed && (
        <div className="area-body" style={{marginTop:4}}>
          {area.items.length === 0 && (
            <div style={{fontSize:12, color:"var(--text-muted)", padding:"6px 8px", fontStyle:"italic"}}>
              Empty — click <strong style={{color:"var(--text-soft)"}}>+ Item</strong> or drop one here.
            </div>
          )}
          {area.items.map((it, i) => (
            <ItemRow key={it.id}
              projectId={projectId} sectionKey={sectionKey} areaId={area.id}
              item={it}
              ownerSuggestions={ownerSuggestions}
              onChange={(updated)=>updateItem(i, updated)}
              onDelete={()=>deleteItem(i)}
            />
          ))}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   Section block
   ============================================================ */
function SectionBlock({ projectId, sectionKey, label, emptyHint, areas, onChange, collapsed, onToggleCollapsed, ownerSuggestions }) {
  const [drag] = useContext(DragCtx);
  const [dropEmpty, setDropEmpty] = useState(false);

  const updateArea = (i, updated) => onChange(areas.map((a, idx) => idx === i ? updated : a));
  const deleteArea = (i) => onChange(areas.filter((_, idx) => idx !== i));
  const addArea = () => onChange([...areas, emptyArea("New area")]);

  const counts = useMemo(() => {
    const all = areas.flatMap(a => a.items);
    return { done: all.filter(i => i.status==="done").length, total: all.length };
  }, [areas]);

  const sectionDragOver = (e) => {
    if (drag?.kind === 'item' && areas.length === 0) { e.preventDefault(); setDropEmpty(true); }
  };
  const sectionDrop = (e) => {
    if (drag?.kind === 'item' && areas.length === 0) {
      e.preventDefault(); setDropEmpty(false);
      window.__pcDrop?.({ targetKind:'section-empty', projectId, sectionKey });
    }
  };

  return (
    <div style={{marginTop:24}}>
      <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:8, paddingBottom:6, borderBottom:"1px solid var(--border)"}}>
        <Caret open={!collapsed} onClick={onToggleCollapsed}
          label={collapsed?"Expand section":"Collapse section"}/>
        <div className="section-label">{label}</div>
        {counts.total > 0 && (
          <span style={{fontSize:11, color:"var(--text-muted)", fontWeight:600}}>· {counts.done}/{counts.total}</span>
        )}
        <div style={{flex:1}}/>
        <button type="button" onClick={addArea} className="btn-ghost focusable"
          style={{fontSize:11.5}}>
          <Icon.Plus style={{width:11, height:11}}/> Area
        </button>
      </div>
      {!collapsed && (
        <div onDragOver={sectionDragOver} onDragLeave={()=>setDropEmpty(false)} onDrop={sectionDrop}>
          {areas.length === 0 ? (
            <div
              className={dropEmpty ? "drop-into" : ""}
              style={{padding:"22px 16px", borderRadius:"var(--r-md)", border:"1px dashed var(--border-strong)",
                color:"var(--text-muted)", fontSize:12.5, textAlign:"center", background:"transparent"}}>
              {emptyHint}
            </div>
          ) : (
            areas.map((a, i) => (
              <AreaBlock key={a.id}
                projectId={projectId} sectionKey={sectionKey}
                area={a}
                ownerSuggestions={ownerSuggestions}
                onChange={(updated)=>updateArea(i, updated)}
                onDelete={()=>deleteArea(i)}
              />
            ))
          )}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   Project card
   ============================================================ */
function ProjectCard({ project, onChange, onDelete }) {
  const [drag, setDrag] = useContext(DragCtx);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [dropPos, setDropPos] = useState(null);
  const [collapsedSections, setCollapsedSections] = useState({});
  const [collapsedCard, setCollapsedCard] = useState(false);
  const [dragArmed, setDragArmed] = useState(false);

  const set = (field) => (v) => onChange({ ...project, [field]: v });

  const dragStart = (e) => {
    if (!dragArmed) { e.preventDefault(); return; }
    setDrag({ kind:'project', projectId: project.id });
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', project.id); } catch {}
  };
  const dragOver = (e) => {
    if (drag?.kind !== 'project') return;
    e.preventDefault();
    const r = e.currentTarget.getBoundingClientRect();
    setDropPos((e.clientY - r.top) < r.height/2 ? 'before' : 'after');
  };
  const dragLeave = () => setDropPos(null);
  const drop = (e) => {
    if (drag?.kind !== 'project') return;
    e.preventDefault();
    const pos = dropPos; setDropPos(null);
    window.__pcDrop?.({ targetKind:'project', projectId: project.id, position: pos });
  };

  const isSrc = drag?.kind==='project' && drag.projectId === project.id;
  const totalItems = (project.whatsBeenDone||[]).concat(project.workingOnNow||[], project.blockers||[])
    .reduce((acc,a)=>acc + (a.items?.length||0), 0);

  const ownerSuggestions = useMemo(() => {
    const all = (project.whatsBeenDone||[]).concat(project.workingOnNow||[], project.blockers||[])
      .flatMap(a => (a.items||[]).map(i => (i.owner||"").trim()))
      .filter(Boolean);
    return Array.from(new Set(all));
  }, [project]);

  return (
    <div
      draggable={dragArmed}
      onDragStart={dragStart}
      onDragOver={dragOver}
      onDragLeave={dragLeave}
      onDrop={drop}
      onDragEnd={()=>{ setDrag(null); setDropPos(null); setDragArmed(false); }}
      className={`card ${isSrc?'ghost':''} ${dropPos==='before'?'drop-before':''} ${dropPos==='after'?'drop-after':''}`}
      style={{padding:"18px 22px", marginBottom:16}}>
      <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
        <span
          className="grip"
          onMouseDown={()=>setDragArmed(true)}
          onMouseUp={()=>setDragArmed(false)}
          title="Drag to reorder project"
          aria-label="Drag handle"
          style={{padding:"0 2px"}}>
          <Icon.Grip style={{width:16, height:16}}/>
        </span>
        <Caret open={!collapsedCard} onClick={()=>setCollapsedCard(c=>!c)}
          label={collapsedCard ? "Expand project" : "Collapse project"}/>
        <InlineInput value={project.name} onChange={set("name")}
          placeholder="Project name"
          ariaLabel="Project name"
          style={{flex:1, minWidth:160, fontSize:17, fontWeight:700, color:"var(--text)", padding:"4px 8px"}}
        />
        <ProjectStatusPill value={project.status} onChange={set("status")}/>
        {totalItems > 0 && (
          <span style={{fontSize:11, color:"var(--text-muted)", fontWeight:600, whiteSpace:"nowrap"}}>{totalItems} items</span>
        )}
        {confirmDelete ? (
          <div style={{display:"flex", gap:6, alignItems:"center"}}>
            <span style={{fontSize:11.5, color:"var(--text-soft)"}}>Delete?</span>
            <button type="button" onClick={()=>{onDelete(project.id); setConfirmDelete(false);}}
              className="focusable"
              style={{background:"var(--danger)", color:"#fff", borderRadius:"var(--r-sm)", padding:"5px 10px", fontSize:11.5, fontWeight:700}}>Yes</button>
            <button type="button" onClick={()=>setConfirmDelete(false)}
              className="focusable"
              style={{background:"var(--hover)", color:"var(--text-soft)", borderRadius:"var(--r-sm)", padding:"5px 10px", fontSize:11.5, fontWeight:700}}>No</button>
          </div>
        ) : (
          <button type="button" onClick={()=>setConfirmDelete(true)} title="Delete project"
            className="iconbtn danger focusable" aria-label="Delete project"><Icon.Trash/></button>
        )}
      </div>

      {!collapsedCard && (
        <>
          {SECTIONS.map(s => (
            <SectionBlock key={s.key}
              projectId={project.id}
              sectionKey={s.key}
              label={s.label}
              emptyHint={s.emptyHint}
              areas={project[s.key] || []}
              collapsed={!!collapsedSections[s.key]}
              ownerSuggestions={ownerSuggestions}
              onToggleCollapsed={()=>setCollapsedSections(c=>({...c, [s.key]: !c[s.key]}))}
              onChange={(next)=>onChange({ ...project, [s.key]: next })}
            />
          ))}

          <div style={{display:"grid", gridTemplateColumns:"2fr 1fr", gap:12, marginTop:24, paddingTop:18, borderTop:"1px solid var(--border)"}}>
            <div>
              <div className="field-label">Next milestone</div>
              <input className="field-input" value={project.nextMilestone}
                onChange={e=>set("nextMilestone")(e.target.value)}
                placeholder="The next visible deliverable."/>
            </div>
            <div>
              <div className="field-label">ETA</div>
              <input className="field-input" value={project.eta}
                onChange={e=>set("eta")(e.target.value)}
                placeholder="e.g. Fri / Mar 4 / 2w"/>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ============================================================
   App
   ============================================================ */
function App() {
  const [ready, setReady]   = useState(false);
  const [projects, setProjects] = useState([]);
  const [saving, setSaving] = useState(false);
  const [toast, setToast]   = useState({ show:false, msg:"", ok:true });
  const [sourceMsg, setSourceMsg] = useState("");
  const saveTimer = useRef(null);
  const dragState = useDragController();

  const flash = (msg, ok=true) => {
    setToast({show:true, msg, ok});
    setTimeout(()=>setToast(t=>({...t, show:false})), 2200);
  };

  useEffect(() => {
    (async () => {
      try {
        const remote = await apiLoad();
        if (remote && remote.length) {
          const norm = remote.map(normalizeProject).sort((a,b)=>a.sortOrder-b.sortOrder);
          setProjects(norm);
          saveLocal(norm);
          setSourceMsg("Synced from Google Sheets");
        } else {
          const local = loadLocal();
          if (local && local.length) {
            setProjects(local.map(normalizeProject));
            setSourceMsg("Loaded from local backup (sheet empty)");
          } else {
            const seed = [{ ...emptyProject(), name: "Ai Avatar", sortOrder: 1 }];
            setProjects(seed);
            setSourceMsg("Started a fresh project");
          }
        }
      } catch (e) {
        const local = loadLocal();
        if (local && local.length) {
          setProjects(local.map(normalizeProject));
          setSourceMsg("Offline — using local backup");
          flash("Couldn't reach n8n — working offline", false);
        } else {
          const seed = [{ ...emptyProject(), name: "Ai Avatar", sortOrder: 1 }];
          setProjects(seed);
          setSourceMsg("Offline — starting fresh");
          flash("Couldn't reach n8n — working offline", false);
        }
      }
      setReady(true);
    })();
  }, []);

  const persist = useCallback((next) => {
    saveLocal(next);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setSaving(true);
    saveTimer.current = setTimeout(async () => {
      try { await apiSave(next); flash("Saved"); }
      catch { flash("Save failed (kept local copy)", false); }
      finally { setSaving(false); }
    }, 900);
  }, []);

  const updateProject = (updated) => {
    const next = projects.map(p => p.id === updated.id ? updated : p);
    setProjects(next); persist(next);
  };
  const deleteProject = (id) => {
    const next = projects.filter(p => p.id !== id).map((p,i)=>({...p, sortOrder: i+1}));
    setProjects(next); persist(next);
  };
  const addProject = () => {
    const next = [...projects, { ...emptyProject(), sortOrder: projects.length + 1 }];
    setProjects(next); persist(next);
    setTimeout(()=>window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }), 50);
  };

  /* drag dispatcher */
  useEffect(() => {
    window.__pcDrop = (target) => {
      const drag = dragState[0];
      if (!drag) return;
      const next = JSON.parse(JSON.stringify(projects));
      const findProject = (pid) => next.find(p => p.id === pid);
      const removeItem = (pid, sectionKey, itemId) => {
        const p = findProject(pid); if (!p) return null;
        for (const a of p[sectionKey] || []) {
          const idx = a.items.findIndex(i => i.id === itemId);
          if (idx >= 0) return a.items.splice(idx, 1)[0];
        }
        return null;
      };

      if (drag.kind === 'project' && target.targetKind === 'project') {
        if (drag.projectId === target.projectId) return;
        const fromIdx = next.findIndex(p => p.id === drag.projectId);
        if (fromIdx < 0) return;
        const [m] = next.splice(fromIdx, 1);
        let toIdx = next.findIndex(p => p.id === target.projectId);
        if (toIdx < 0) return;
        const insertAt = toIdx + (target.position === 'after' ? 1 : 0);
        next.splice(insertAt, 0, m);
        next.forEach((p,i) => p.sortOrder = i+1);
      }
      else if (drag.kind === 'area' && target.targetKind === 'area') {
        if (drag.projectId !== target.projectId || drag.sectionKey !== target.sectionKey) return;
        const p = findProject(drag.projectId);
        const list = p[drag.sectionKey];
        const fromIdx = list.findIndex(a => a.id === drag.areaId);
        if (fromIdx < 0) return;
        const [m] = list.splice(fromIdx, 1);
        let toIdx = list.findIndex(a => a.id === target.areaId);
        if (toIdx < 0) return;
        const insertAt = toIdx + (target.position === 'after' ? 1 : 0);
        list.splice(insertAt, 0, m);
      }
      else if (drag.kind === 'item') {
        const moved = removeItem(drag.projectId, drag.sectionKey, drag.itemId);
        if (!moved) return;
        if (target.targetKind === 'item') {
          const p = findProject(target.projectId);
          const area = p[target.sectionKey].find(a => a.id === target.areaId);
          if (!area) return;
          const idx = area.items.findIndex(i => i.id === target.itemId);
          area.items.splice(idx + (target.position === 'after' ? 1 : 0), 0, moved);
        } else if (target.targetKind === 'area-empty') {
          const p = findProject(target.projectId);
          const area = p[target.sectionKey].find(a => a.id === target.areaId);
          if (!area) return;
          area.items.push(moved);
        } else if (target.targetKind === 'section-empty') {
          const p = findProject(target.projectId);
          const area = emptyArea("New area");
          area.items.push(moved);
          p[target.sectionKey].push(area);
        }
      }

      setProjects(next);
      persist(next);
    };
    return () => { delete window.__pcDrop; };
  }, [projects, persist, dragState]);

  const exportJson = () => {
    const blob = new Blob([JSON.stringify(projects, null, 2)], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `project-central-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  if (!ready) return (
    <div style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", color:"var(--text-muted)", fontSize:13, gap:14}}>
      <div className="spinner"/>Loading…
    </div>
  );

  const statusCounts = PROJECT_STATUSES.reduce((acc,s)=>{ acc[s]=projects.filter(p=>p.status===s).length; return acc; }, {});

  return (
    <DragCtx.Provider value={dragState}>
      <div className="container">
        <div className={`toast${toast.show?" show":""}${toast.ok?"":" err"}`} role="status" aria-live="polite">
          {toast.msg}
        </div>

        <header style={{display:"flex", alignItems:"flex-end", justifyContent:"space-between", flexWrap:"wrap", gap:12, marginBottom:18}}>
          <div>
            <h1 style={{margin:0, fontSize:22, fontWeight:800, letterSpacing:"-.02em"}}>Project Central</h1>
            <div style={{fontSize:12, color:"var(--text-muted)", marginTop:4}}>
              {projects.length} project{projects.length===1?"":"s"} · {saving ? "saving…" : "all changes saved"}
              {sourceMsg && <span style={{marginLeft:6}}>· {sourceMsg}</span>}
            </div>
          </div>
          <div style={{display:"flex", gap:8, alignItems:"center"}}>
            <button type="button" onClick={exportJson} className="btn focusable">
              <Icon.Download/> Export
            </button>
            <a href={SHEET_URL} target="_blank" rel="noreferrer" className="btn focusable" style={{textDecoration:"none"}}>
              <Icon.Sheet/> Sheet
            </a>
            <button type="button" onClick={addProject} className="btn btn-primary focusable">
              <Icon.Plus/> Add Project
            </button>
          </div>
        </header>

        {projects.length > 0 && (
          <div style={{display:"flex", gap:6, flexWrap:"wrap", marginBottom:16}}>
            {PROJECT_STATUSES.map(s => {
              const m = PROJECT_STATUS_META[s];
              const n = statusCounts[s];
              if (!n) return null;
              return (
                <div key={s} className="status-pill" style={{background:m.bg, color:m.text, fontSize:11}}>
                  <span className="dot" style={{background:m.dot}}/>{s} · {n}
                </div>
              );
            })}
          </div>
        )}

        {projects.map(p => (
          <ProjectCard key={p.id} project={p} onChange={updateProject} onDelete={deleteProject}/>
        ))}

        {projects.length === 0 && (
          <div className="card" style={{padding:48, textAlign:"center", color:"var(--text-muted)", fontSize:13.5}}>
            No projects yet. Click <strong style={{color:"var(--text)"}}>+ Add Project</strong> to get started.
          </div>
        )}
      </div>
    </DragCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
