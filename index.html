async function loadFromGist() {
  const token = getToken();
  if (!token) return null;
  const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" }
  });
  if (!r.ok) { localStorage.removeItem("pc_token"); throw new Error("Invalid token"); }
  const d = await r.json();
  const content = d.files[GIST_FILE]?.content;
  if (!content) return null;
  const parsed = JSON.parse(content);
  if (!parsed.pipeline) return null;
  return parsed;
}

async function saveToGist(data) {
  const token = getToken();
  if (!token) return;
  await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: "PATCH",
    headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(data) } } })
  });
}

  return (
    <div draggable={draggable}
      onDragStart={dragHandlers.onDragStart(t.id)} onDragOver={dragHandlers.onDragOver}
      onDrop={dragHandlers.onDrop(t.id)} onDragEnd={e=>{setDraggable(false);dragHandlers.onDragEnd(e);}}

      style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,border:"1px solid #F1F5F9",background:"#fff",cursor:"default"}}>

function AreaSection({ area, areaTasks, onStatusChange, onEdit, onDelete, onReorder }) {
  const [collapsed,setCollapsed]=useState(false);
  const [dragId,setDragId]=useState(null);
  const color=AREA_COLORS[area]||"#6366F1";
  const doneCnt=areaTasks.filter(t=>t.status==="DONE").length;
  const dh={
    onDragStart:id=>e=>{setDragId(id);e.dataTransfer.effectAllowed="move";},
    onDragOver:e=>{e.preventDefault();e.currentTarget.classList.add("drag-over");},
    onDrop:targetId=>e=>{
      e.preventDefault();e.currentTarget.classList.remove("drag-over");
      if(dragId===targetId)return;
      const fi=areaTasks.findIndex(t=>t.id===dragId),ti=areaTasks.findIndex(t=>t.id===targetId);
      const r=[...areaTasks];const[m]=r.splice(fi,1);r.splice(ti,0,m);
      onReorder(area,r.map((t,i)=>({...t,order:i+1})));
    },
    onDragEnd:e=>{setDragId(null);e.currentTarget.classList.remove("drag-over");},
  };
  return (
    <div style={{marginBottom:16}}>
      <div onClick={()=>setCollapsed(c=>!c)} style={{display:"flex",alignItems:"center",gap:10,marginBottom:collapsed?0:6,cursor:"pointer",userSelect:"none"}}>
        <div style={{width:4,height:18,borderRadius:2,background:color,flexShrink:0}}/>
        <div style={{fontWeight:700,fontSize:13}}>{area}</div>
        <div style={{fontSize:11,color:"#94A3B8"}}>{doneCnt}/{areaTasks.length} done</div>
        <div style={{flex:1,height:1,background:`linear-gradient(to right,${color}33,transparent)`}}/>
        <span style={{fontSize:11,color:"#94A3B8"}}>{collapsed?"▶":"▼"}</span>
      </div>
      {!collapsed&&(
        <div style={{display:"flex",flexDirection:"column",gap:4,paddingLeft:14}}>
          {areaTasks.map(t=><TaskRow key={t.id} t={t} onStatusChange={onStatusChange} onEdit={onEdit} onDelete={onDelete} dragHandlers={dh}/>)}
        </div>
      )}
    </div>
  );
}

function App() {
  const [ready,setReady]=useState(false);
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState({show:false,msg:"",ok:true});
  const [tab,setTab]=useState("pipeline");
  const [pipeline,setPipeline]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [blocked,setBlocked]=useState([]);
  const saveTimer = useRef(null);

  const [addPOpen,setAddPOpen]=useState(false);
  const [addTOpen,setAddTOpen]=useState(false);
  const [addBOpen,setAddBOpen]=useState(false);
  const [editP,setEditP]=useState(null);
  const [editT,setEditT]=useState(null);
  const [editB,setEditB]=useState(null);
  const [pf,setPf]=useState({title:"",desc:"",done:false});
  const [tf,setTf]=useState({area:"N8N",task:"",status:"PENDING",who:"",position:"bottom"});
  const [bf,setBf]=useState({what:"",why:"",pri:"HIGH"});

  const flash=(msg,ok=true)=>{setToast({show:true,msg,ok});setTimeout(()=>setToast(t=>({...t,show:false})),2200);};

  useEffect(()=>{
    (async()=>{
      try {
        const data = await loadFromGist();
        if(data){
          setPipeline(data.pipeline);
          setTasks(data.tasks);
          setBlocked(data.blocked);
        } else {
          setPipeline(INIT_PIPELINE);
          setTasks(INIT_TASKS);
          setBlocked(INIT_BLOCKED);
          await saveToGist({pipeline:INIT_PIPELINE,tasks:INIT_TASKS,blocked:INIT_BLOCKED});
        }
      } catch(e) {
        setPipeline(INIT_PIPELINE);
        setTasks(INIT_TASKS);
        setBlocked(INIT_BLOCKED);
        flash("⚠️ Couldn't connect to Gist — working offline",false);
      }
      setReady(true);
    })();
  },[]);

  const debouncedSave = useCallback((data)=>{
    if(saveTimer.current) clearTimeout(saveTimer.current);
    setSaving(true);
    saveTimer.current = setTimeout(async()=>{
      try {
        await saveToGist(data);
        flash("✓ Saved");
      } catch(e){ flash("✗ Save failed",false); }
      setSaving(false);
    }, 800);
  },[]);

  const doSaveP=useCallback((data,t,b)=>{ setPipeline(data); debouncedSave({pipeline:data,tasks:t,blocked:b}); },[debouncedSave]);
  const doSaveT=useCallback((p,data,b)=>{ setTasks(data); debouncedSave({pipeline:p,tasks:data,blocked:b}); },[debouncedSave]);
  const doSaveB=useCallback((p,t,data)=>{ setBlocked(data); debouncedSave({pipeline:p,tasks:t,blocked:data}); },[debouncedSave]);

  const nextId=arr=>Math.max(0,...arr.map(x=>x.id))+1;
  const areas=[...new Set([...AREA_ORDER,...tasks.map(t=>t.area)])];

  function submitP(){
    if(!pf.title.trim())return;
    const u=editP?pipeline.map(x=>x.id===editP.id?{...x,...pf}:x):[...pipeline,{id:nextId(pipeline),...pf}];
    doSaveP(u,tasks,blocked);setPf({title:"",desc:"",done:false});setAddPOpen(false);setEditP(null);
  }
  function submitT(){
    if(!tf.task.trim())return;
    let u;
    if(editT){
      u=tasks.map(x=>x.id===editT.id?{...x,area:tf.area,task:tf.task,status:tf.status,who:tf.who}:x);
    } else {
      const at=tasks.filter(t=>t.area===tf.area).sort((a,b)=>a.order-b.order);
      const pos=tf.position==="top"?0:tf.position==="bottom"?at.length:parseInt(tf.position)-1;
      const nt={id:nextId(tasks),area:tf.area,task:tf.task,status:tf.status,who:tf.who,order:pos+1};
      const ins=[...at];ins.splice(pos,0,nt);
      const ren=ins.map((t,i)=>({...t,order:i+1}));
      u=[...tasks.filter(t=>t.area!==tf.area),...ren];
    }
    doSaveT(pipeline,u,blocked);setTf({area:"N8N",task:"",status:"PENDING",who:"",position:"bottom"});setAddTOpen(false);setEditT(null);
  }
  function submitB(){
    if(!bf.what.trim())return;
    const u=editB?blocked.map(x=>x.id===editB.id?{...x,...bf}:x):[...blocked,{id:nextId(blocked),...bf}];
    doSaveB(pipeline,tasks,u);setBf({what:"",why:"",pri:"HIGH"});setAddBOpen(false);setEditB(null);
  }

  const selAreaTasks=tasks.filter(t=>t.area===tf.area).sort((a,b)=>a.order-b.order);
  const posOpts=[
    {value:"top",label:"Top (position 1)"},
    ...selAreaTasks.map((t,i)=>({value:String(i+2),label:`After: "${t.task.slice(0,38)}${t.task.length>38?"…":""}"`})),
    {value:"bottom",label:"Bottom (last)"},
  ];

  const pDone=pipeline.filter(p=>p.done).length;
  const tDone=tasks.filter(t=>t.status==="DONE").length;
  const tWait=tasks.filter(t=>t.status==="WAITING").length;

  if(!ready) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",color:"#94A3B8",fontSize:14,gap:12}}>
      <div style={{width:32,height:32,border:"3px solid #E2E8F0",borderTop:"3px solid #6366F1",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      Loading…
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#F8FAFC",padding:"24px 20px"}}>
      <div className={`toast${toast.show?" show":""}`} style={{background:toast.ok?"#0F172A":"#EF4444",color:"#fff"}}>{toast.msg}</div>

      <div style={{maxWidth:980,margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontSize:22,fontWeight:800,letterSpacing:"-.02em"}}>Project Central</div>
          <div style={{fontSize:13,color:"#94A3B8",marginTop:2}}>Client Acquisition & Onboarding · {saving?"saving…":"all changes saved"}</div>
        </div>
        <div style={{fontSize:12,color:"#CBD5E1",background:"#fff",padding:"6px 14px",borderRadius:20,border:"1px solid #E2E8F0"}}>
          {new Date().toLocaleDateString("en-US",{weekday:"short",year:"numeric",month:"short",day:"numeric"})}
        </div>
      </div>

      <div style={{maxWidth:980,margin:"0 auto 20px",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        {[
          {label:"Pipeline Progress",val:`${pDone}/${pipeline.length}`,sub:"steps complete",color:"#6366F1"},
          {label:"Tasks Complete",   val:`${tDone}/${tasks.length}`,   sub:"tasks done",    color:"#10B981"},
          {label:"Waiting",          val:tWait,                        sub:"tasks on hold", color:"#F59E0B"},
          {label:"Blockers",         val:blocked.length,               sub:"need attention",color:"#EF4444"},
        ].map(s=>(
          <div key={s.label} className="card" style={{padding:"16px 18px",borderTop:`3px solid ${s.color}`}}>
            <div style={{fontSize:26,fontWeight:800,color:s.color}}>{s.val}</div>
            <div style={{fontSize:12,fontWeight:600,marginTop:2}}>{s.label}</div>
            <div style={{fontSize:11,color:"#94A3B8"}}>{s.sub}</div>
          </div>
        ))}
      </div>

      <div className="card" style={{maxWidth:980,margin:"0 auto",borderRadius:16,overflow:"hidden"}}>
        <div style={{display:"flex",gap:6,padding:"14px 16px",borderBottom:"1px solid #F1F5F9",background:"#FAFAFA"}}>
          <TabBtn label="📋 Pipeline"  active={tab==="pipeline"} onClick={()=>setTab("pipeline")} count={pipeline.length}/>
          <TabBtn label="✅ Tasks"     active={tab==="tasks"}    onClick={()=>setTab("tasks")}    count={tasks.length}/>
          <TabBtn label="🚫 Blockers" active={tab==="blocked"}  onClick={()=>setTab("blocked")}  count={blocked.length}/>
        </div>
        <div style={{padding:20}}>

          {tab==="pipeline"&&(
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div><div style={{fontWeight:700,fontSize:15}}>Full Pipeline Overview</div><div style={{fontSize:12,color:"#94A3B8",marginTop:2}}>Track every step from awareness to kickoff</div></div>
                <Btn onClick={()=>{setPf({title:"",desc:"",done:false});setEditP(null);setAddPOpen(true);}}>+ Add Step</Btn>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {pipeline.map((p,i)=>(
                  <div key={p.id} className="row-hover" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:10,border:"1.5px solid",borderColor:p.done?"#BBFBD0":"#E2E8F0",background:p.done?"#F0FDF4":"#fff"}}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:p.done?"#16A34A":"#E2E8F0",color:p.done?"#fff":"#94A3B8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{p.done?"✓":i+1}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,color:p.done?"#15803D":"#0F172A"}}>{p.title}</div>
                      <div style={{fontSize:12,color:"#94A3B8",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.desc}</div>
                    </div>
                    <StatusPill value={p.done?"DONE":"PENDING"} onChange={v=>{const u=pipeline.map(x=>x.id===p.id?{...x,done:v==="DONE"}:x);doSaveP(u,tasks,blocked);}} options={["DONE","PENDING"]}/>
                    <div style={{display:"flex",gap:4}}>
                      <IconBtn onClick={()=>{setPf({title:p.title,desc:p.desc,done:p.done});setEditP(p);setAddPOpen(true);}} icon="✏️"/>
                      <IconBtn onClick={()=>doSaveP(pipeline.filter(x=>x.id!==p.id),tasks,blocked)} icon="🗑️" color="#EF4444"/>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}

          {tab==="tasks"&&(
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div><div style={{fontWeight:700,fontSize:15}}>Task Status Tracker</div><div style={{fontSize:12,color:"#94A3B8",marginTop:2}}>Drag ⠿ to reorder within each area</div></div>
                <Btn onClick={()=>{setTf({area:areas[0]||"N8N",task:"",status:"PENDING",who:"",position:"bottom"});setEditT(null);setAddTOpen(true);}}>+ Add Task</Btn>
              </div>
              {areas.map(area=>(
                <AreaSection key={area} area={area}
                  areaTasks={tasks.filter(t=>t.area===area).sort((a,b)=>a.order-b.order)}
                  onStatusChange={(id,v)=>{const u=tasks.map(x=>x.id===id?{...x,status:v}:x);doSaveT(pipeline,u,blocked);}}
                  onEdit={t=>{setTf({area:t.area,task:t.task,status:t.status,who:t.who,position:"bottom"});setEditT(t);setAddTOpen(true);}}
                  onDelete={id=>doSaveT(pipeline,tasks.filter(x=>x.id!==id),blocked)}
                  onReorder={(area,reordered)=>{
                    const u=[...tasks.filter(t=>t.area!==area),...reordered];
                    doSaveT(pipeline,u,blocked);
                  }}
                />
              ))}
            </>
          )}

          {tab==="blocked"&&(
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div><div style={{fontWeight:700,fontSize:15}}>Blockers</div><div style={{fontSize:12,color:"#94A3B8",marginTop:2}}>What needs to happen before we can move forward</div></div>
                <Btn onClick={()=>{setBf({what:"",why:"",pri:"HIGH"});setEditB(null);setAddBOpen(true);}}>+ Add Blocker</Btn>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {blocked.map((b,i)=>(
                  <div key={b.id} className="row-hover" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:10,border:"1.5px solid #FEE2E2",background:"#FFF9F9"}}>
                    <div style={{width:22,height:22,borderRadius:"50%",background:"#FEE2E2",color:"#EF4444",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13}}>{b.what}</div>
                      <div style={{fontSize:12,color:"#94A3B8",marginTop:2}}>{b.why}</div>
                    </div>
                    <PriBadge value={b.pri} onChange={v=>doSaveB(pipeline,tasks,blocked.map(x=>x.id===b.id?{...x,pri:v}:x))}/>
                    <div style={{display:"flex",gap:2}}>
                      <IconBtn onClick={()=>{setBf({what:b.what,why:b.why,pri:b.pri});setEditB(b);setAddBOpen(true);}} icon="✏️"/>
                      <IconBtn onClick={()=>doSaveB(pipeline,tasks,blocked.filter(x=>x.id!==b.id))} icon="🗑️" color="#EF4444"/>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>

      {addPOpen&&(
        <Modal title={editP?"Edit Step":"Add Pipeline Step"} onClose={()=>{setAddPOpen(false);setEditP(null);}}>
          <Field label="Title *" value={pf.title} onChange={v=>setPf(f=>({...f,title:v}))} placeholder="e.g. Retargeting Ads"/>
          <Field label="Description" value={pf.desc} onChange={v=>setPf(f=>({...f,desc:v}))} placeholder="What does this step do?" multiline/>
          <div style={{marginBottom:18}}>
            <label style={{display:"block",fontWeight:600,fontSize:12,color:"#64748B",marginBottom:8,textTransform:"uppercase",letterSpacing:".04em"}}>Status</label>
            <div style={{display:"flex",gap:10}}>
              {["PENDING","DONE"].map(s=>(
                <label key={s} style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:13,fontWeight:pf.done===(s==="DONE")?600:400,color:pf.done===(s==="DONE")?"#6366F1":"#64748B"}}>
                  <input type="radio" checked={pf.done===(s==="DONE")} onChange={()=>setPf(f=>({...f,done:s==="DONE"}))}/> {s}
                </label>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={()=>{setAddPOpen(false);setEditP(null);}}>Cancel</Btn>
            <Btn onClick={submitP}>{editP?"Save Changes":"Add Step"}</Btn>
          </div>
        </Modal>
      )}

      {addTOpen&&(
        <Modal title={editT?"Edit Task":"Add Task"} onClose={()=>{setAddTOpen(false);setEditT(null);}}>
          <FieldSelect label="Area" value={tf.area} onChange={v=>setTf(f=>({...f,area:v,position:"bottom"}))} options={areas}/>
          <Field label="Task *" value={tf.task} onChange={v=>setTf(f=>({...f,task:v}))} placeholder="Describe the task" multiline/>
          <FieldSelect label="Status" value={tf.status} onChange={v=>setTf(f=>({...f,status:v}))} options={STATUS_OPTIONS}/>
          <Field label="Who" value={tf.who} onChange={v=>setTf(f=>({...f,who:v}))} placeholder="e.g. Me, Kasper, Editor"/>
          {!editT&&(
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontWeight:600,fontSize:12,color:"#64748B",marginBottom:5,textTransform:"uppercase",letterSpacing:".04em"}}>Position in "{tf.area}"</label>
              <select value={tf.position} onChange={e=>setTf(f=>({...f,position:e.target.value}))}
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #6366F1",borderRadius:8,fontSize:13,background:"#EEF2FF",color:"#4338CA",outline:"none",fontWeight:500}}>
                {posOpts.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </div>
          )}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={()=>{setAddTOpen(false);setEditT(null);}}>Cancel</Btn>
            <Btn onClick={submitT}>{editT?"Save Changes":"Add Task"}</Btn>
          </div>
        </Modal>
      )}

      {addBOpen&&(
        <Modal title={editB?"Edit Blocker":"Add Blocker"} onClose={()=>{setAddBOpen(false);setEditB(null);}}>
          <Field label="What is needed *" value={bf.what} onChange={v=>setBf(f=>({...f,what:v}))} placeholder="e.g. Kasper sends client list"/>
          <Field label="Why it's needed" value={bf.why} onChange={v=>setBf(f=>({...f,why:v}))} placeholder="Explain what it unblocks" multiline/>
          <FieldSelect label="Priority" value={bf.pri} onChange={v=>setBf(f=>({...f,pri:v}))} options={PRI_OPTIONS}/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={()=>{setAddBOpen(false);setEditB(null);}}>Cancel</Btn>
            <Btn onClick={submitB}>{editB?"Save Changes":"Add Blocker"}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
