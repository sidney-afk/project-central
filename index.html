<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Central Board</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<meta name="theme-color" content="#FAFAF9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1A1A19" media="(prefers-color-scheme: dark)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg:           #FAFAF9;
  --surface:      #FFFFFF;
  --surface-elev: #FFFFFF;
  --hover:        #F4F4F2;
  --border:       #ECECEA;
  --border-strong:#D9D9D6;
  --text:         #1F1F1E;
  --text-soft:    #555552;
  --text-muted:   #8B8B86;
  --text-faint:   #C9C9C5;
  --accent:       #2563EB;
  --accent-soft:  rgba(37,99,235,.10);
  --accent-text:  #1E40AF;
  --danger:       #DC2626;
  --danger-soft:  rgba(220,38,38,.10);

  --st-done:     #10B981;
  --st-progress: #3B82F6;
  --st-waiting:  #F59E0B;
  --st-pending:  #9CA3AF;
  --st-to-plan:  #A78BFA;
  --st-blocker:  #EF4444;

  --r-sm: 4px;
  --r:    8px;
  --r-lg: 12px;
  --r-card: 14px;
  --r-pill: 999px;

  --shadow-1:   0 1px 2px rgba(0,0,0,.04);
  --shadow-2:   0 4px 16px rgba(0,0,0,.06);
  --shadow-pop: 0 12px 32px rgba(0,0,0,.12), 0 2px 6px rgba(0,0,0,.06);

  --ease:      cubic-bezier(.2,.7,.2,1);
  --dur-fast:  120ms;
  --dur:       180ms;

  color-scheme: light;
}

[data-theme="dark"] {
  --bg:           #1A1A19;
  --surface:      #232322;
  --surface-elev: #2A2A28;
  --hover:        #2C2C2A;
  --border:       #2F2F2D;
  --border-strong:#3D3D3A;
  --text:         #ECECEA;
  --text-soft:    #B8B8B4;
  --text-muted:   #7E7E79;
  --text-faint:   #4D4D4A;
  --accent:       #6AA0FF;
  --accent-soft:  rgba(106,160,255,.14);
  --accent-text:  #93B8FF;
  --danger:       #F87171;
  --danger-soft:  rgba(248,113,113,.14);

  --shadow-1:   0 1px 2px rgba(0,0,0,.30);
  --shadow-2:   0 4px 18px rgba(0,0,0,.36);
  --shadow-pop: 0 16px 40px rgba(0,0,0,.48), 0 2px 8px rgba(0,0,0,.32);

  color-scheme: dark;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-feature-settings: "cv11","ss01","ss03";
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}
button, input, select, textarea { font-family: inherit; color: inherit; }
button { cursor: pointer; background: none; border: none; padding: 0; }
textarea { resize: none; }

/* Focus */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-sm); }

/* Layout */
.page { max-width: 1024px; margin: 0 auto; padding: 32px 24px 96px; }

/* Top bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; margin-bottom: 24px;
}
.topbar-title { display: flex; align-items: baseline; gap: 12px; }
.topbar-title h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
.topbar-sub { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--st-pending);
  transition: background var(--dur) var(--ease);
}
.sync-dot.saving { background: var(--st-waiting); animation: pulse 1.2s ease-in-out infinite; }
.sync-dot.saved  { background: var(--st-done); }
.sync-dot.error  { background: var(--st-blocker); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

.topbar-actions { display: flex; align-items: center; gap: 6px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  border-radius: var(--r);
  font-size: 12.5px; font-weight: 600;
  color: var(--text-soft);
  background: transparent;
  border: 1px solid transparent;
  white-space: nowrap;
  transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);
}
.btn:hover { background: var(--hover); color: var(--text); }
.btn-outline { border-color: var(--border); background: var(--surface); }
.btn-outline:hover { border-color: var(--border-strong); background: var(--hover); }
.btn-primary {
  background: var(--text); color: var(--surface);
  border-color: var(--text);
}
[data-theme="dark"] .btn-primary { background: var(--text); color: #1A1A19; border-color: var(--text); }
.btn-primary:hover { filter: brightness(1.1); background: var(--text); color: var(--surface); }
[data-theme="dark"] .btn-primary:hover { filter: brightness(.95); }
.btn-ghost { padding: 6px 10px; border-radius: var(--r-sm); }

.iconbtn {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  border-radius: var(--r-sm);
  transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.iconbtn:hover { background: var(--hover); color: var(--text); }
.iconbtn.danger:hover { background: var(--danger-soft); color: var(--danger); }
.iconbtn svg { width: 14px; height: 14px; display: block; }

/* Project status badge */
.project-status {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px 3px 9px;
  border-radius: var(--r-pill);
  font-size: 11.5px; font-weight: 600;
  transition: filter var(--dur-fast) var(--ease);
  white-space: nowrap;
}
.project-status:hover { filter: brightness(.96); }
[data-theme="dark"] .project-status:hover { filter: brightness(1.15); }
.project-status .dot { width: 6px; height: 6px; border-radius: 50%; }

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  box-shadow: var(--shadow-1);
  padding: 28px 32px;
  transition: box-shadow var(--dur) var(--ease), border-color var(--dur-fast) var(--ease);
}
.card:hover { box-shadow: var(--shadow-2); }

/* Project header */
.project-header { display: flex; align-items: center; gap: 12px; min-height: 36px; }
.project-grip { opacity: 0; transition: opacity var(--dur-fast) var(--ease); }
.card:hover .project-grip { opacity: 1; }
.project-name {
  flex: 1; min-width: 0;
  font-size: 22px; font-weight: 700; letter-spacing: -.01em; color: var(--text);
  background: transparent; border: 1px solid transparent;
  padding: 4px 8px; margin-left: -8px;
  border-radius: var(--r-sm);
  font-family: inherit;
  transition: background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);
}
.project-name:hover { background: var(--hover); }
.project-name:focus { background: var(--surface-elev); border-color: var(--border-strong); outline: none; }
.project-meta-count { font-size: 12px; color: var(--text-muted); font-weight: 500; white-space: nowrap; }

/* Meta row */
.meta-row {
  display: grid; grid-template-columns: 2fr 1fr;
  gap: 16px; margin-top: 16px;
}
.meta-field { display: flex; flex-direction: column; gap: 4px; }
.meta-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: .08em;
  color: var(--text-muted); text-transform: uppercase;
}
.meta-input {
  background: transparent; border: 1px solid transparent;
  padding: 6px 10px; margin-left: -10px;
  border-radius: var(--r);
  font-size: 13px; color: var(--text);
  font-family: inherit;
  transition: background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);
}
.meta-input::placeholder { color: var(--text-faint); }
.meta-input:hover { background: var(--hover); }
.meta-input:focus { background: var(--surface-elev); border-color: var(--border-strong); outline: none; }
.meta-date { color-scheme: light dark; cursor: pointer; min-width: 160px; }
.meta-date:not(:focus):invalid { color: var(--text-faint); }
.meta-date::-webkit-calendar-picker-indicator { cursor: pointer; opacity: .6; }
.meta-date:hover::-webkit-calendar-picker-indicator { opacity: 1; }

/* Filter bar */
.filterbar {
  display: flex; align-items: center; flex-wrap: wrap;
  gap: 6px; margin-top: 24px; padding-bottom: 4px;
}
.filter-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  font-size: 11.5px; font-weight: 600;
  color: var(--text-soft);
  background: transparent;
  border-radius: var(--r-pill);
  transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
  white-space: nowrap;
}
.filter-chip:hover { background: var(--hover); color: var(--text); }
.filter-chip.active {
  background: var(--text); color: var(--surface);
}
[data-theme="dark"] .filter-chip.active { color: #1A1A19; }
.filter-chip .count {
  font-size: 10.5px; font-weight: 700;
  opacity: .65;
  font-variant-numeric: tabular-nums;
}
.filter-chip.active .count { opacity: .8; }
.filterbar-spacer { flex: 1; }
.filterbar-aux { color: var(--text-muted); font-size: 11.5px; font-weight: 600; padding: 5px 10px; border-radius: var(--r-sm); }
.filterbar-aux:hover { background: var(--hover); color: var(--text); }

/* Areas */
.areas { margin-top: 8px; }
.area { margin-top: 24px; }
.area-header {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0 6px;
  border-bottom: 1px solid var(--border);
}
.area-caret {
  width: 18px; height: 18px;
  color: var(--text-muted);
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r-sm);
  transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.area-caret:hover { background: var(--hover); color: var(--text); }
.area-caret svg { width: 12px; height: 12px; transition: transform var(--dur-fast) var(--ease); }
.area-caret.open svg { transform: rotate(90deg); }
.area-name {
  flex: 1; min-width: 0;
  font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-soft);
  background: transparent; border: 1px solid transparent;
  padding: 4px 8px; margin-left: -8px;
  border-radius: var(--r-sm);
  font-family: inherit;
  transition: background var(--dur-fast) var(--ease);
}
.area-name:hover { background: var(--hover); }
.area-name:focus { background: var(--surface-elev); border-color: var(--border-strong); color: var(--text); outline: none; }
.area-count {
  font-size: 11px; color: var(--text-muted); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.area-grip {
  opacity: 0; transition: opacity var(--dur-fast) var(--ease);
}
.area:hover > .area-header > .area-grip { opacity: 1; }
.area-actions { display: flex; align-items: center; gap: 2px; opacity: 0; transition: opacity var(--dur-fast) var(--ease); }
.area:hover > .area-header > .area-actions { opacity: 1; }
.area-body { margin-top: 4px; }
.area-empty {
  font-size: 12.5px; color: var(--text-muted); padding: 8px 4px 4px;
  font-style: italic;
}
.area-empty button { color: var(--text-soft); font-weight: 600; }
.area-empty button:hover { color: var(--accent); }

/* Item row */
.row {
  display: grid;
  grid-template-columns: 14px 16px 18px 1fr auto auto 22px 22px;
  gap: 8px; align-items: start;
  padding: 7px 8px;
  border-radius: var(--r);
  position: relative;
  transition: background var(--dur-fast) var(--ease);
}
.row-kebab { display: flex; align-items: center; justify-content: center; padding-top: 2px; opacity: 0; transition: opacity var(--dur-fast) var(--ease); }
.row:hover .row-kebab { opacity: 1; }
.row:hover { background: var(--hover); }
.row.dragging { opacity: .35; }
.row-grip {
  margin-top: 4px;
  opacity: 0; transition: opacity var(--dur-fast) var(--ease);
  color: var(--text-faint);
  cursor: grab; user-select: none;
}
.row:hover .row-grip { opacity: 1; }
.row-grip:hover { color: var(--text-muted); }
.row-grip:active { cursor: grabbing; }
.row-grip svg { width: 14px; height: 14px; display: block; }

.row-status { padding-top: 4px; line-height: 1; }
.row-status-btn {
  width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r-sm);
  transition: background var(--dur-fast) var(--ease);
}
.row-status-btn:hover { background: var(--hover); }
.row:hover .row-status-btn:hover { background: var(--surface); }

.row-text {
  font-size: 14px; line-height: 1.55; color: var(--text);
  background: transparent; border: none;
  padding: 2px 0;
  outline: none; font-family: inherit; width: 100%;
  overflow: hidden;
}
.row-text::placeholder { color: var(--text-faint); }
.row-text:focus { background: transparent; }

.row-owner { justify-self: end; align-self: start; padding-top: 2px; }
.row-actions { display: flex; align-items: center; justify-content: center; padding-top: 2px; opacity: 0; transition: opacity var(--dur-fast) var(--ease); }
.row:hover .row-actions { opacity: 1; }

/* Status icon */
.status-icon { width: 14px; height: 14px; display: block; }

/* Project / area description (subtle, italic, inline-edit) */
.project-description {
  width: 100%;
  background: transparent; border: 1px solid transparent;
  margin: 6px 0 0 -8px;
  padding: 6px 8px;
  border-radius: var(--r);
  font-size: 13px; line-height: 1.55;
  color: var(--text-soft); font-style: italic;
  font-family: inherit; resize: none; overflow: hidden;
  transition: background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);
}
.project-description::placeholder { color: var(--text-faint); }
.project-description:hover { background: var(--hover); }
.project-description:focus { background: var(--surface-elev); border-color: var(--border); color: var(--text); font-style: normal; outline: none; }

.area-description {
  width: 100%;
  background: transparent; border: 1px solid transparent;
  margin: 2px 0 6px 26px;
  padding: 3px 8px;
  border-radius: var(--r-sm);
  font-size: 12px; line-height: 1.5;
  color: var(--text-muted); font-style: italic;
  font-family: inherit; resize: none; overflow: hidden;
  transition: background var(--dur-fast) var(--ease);
}
.area-description::placeholder { color: var(--text-faint); }
.area-description.hide-empty { display: none; }
.area:hover .area-description.hide-empty { display: block; }
.area-description:hover { background: var(--hover); }
.area-description:focus { background: var(--surface-elev); border-color: var(--border); color: var(--text-soft); font-style: normal; outline: none; display: block; }

/* Due date chip + notes icon (row indicators) */
.row-ind { display: flex; align-items: center; gap: 4px; padding-top: 3px; }
.due-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: var(--r-pill);
  background: var(--hover);
  color: var(--text-soft);
  font-size: 11px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.due-chip:hover { background: var(--border-strong); color: var(--text); }
.due-chip.empty {
  background: transparent;
  color: var(--text-faint);
  border: 1px dashed var(--border);
  opacity: 0;
}
.row:hover .due-chip.empty { opacity: 1; }
.due-chip.empty:hover { color: var(--text-muted); border-color: var(--text-muted); }

.notes-btn {
  width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r-sm);
  color: var(--text-muted);
  transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.notes-btn:hover { background: var(--hover); color: var(--text); }
.notes-btn.has-notes { color: var(--accent); }
.notes-btn.empty { opacity: 0; }
.row:hover .notes-btn.empty { opacity: 1; }
.notes-btn svg { width: 12px; height: 12px; }

/* Notes popover (large textarea) */
.notes-popover {
  position: fixed;
  background: var(--surface-elev);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-pop);
  padding: 10px;
  width: 360px;
  z-index: 200;
  animation: popIn var(--dur-fast) var(--ease);
}
.notes-textarea {
  width: 100%; min-height: 120px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--surface);
  color: var(--text);
  font-size: 13px; font-family: inherit;
  outline: none; resize: vertical;
  line-height: 1.55;
  transition: border-color var(--dur-fast) var(--ease);
}
.notes-textarea:focus { border-color: var(--accent); }
.notes-textarea::placeholder { color: var(--text-faint); }

/* Archived state */
.card.archived { opacity: 0.55; }
.card.archived:hover { opacity: 0.85; }
.archived-tag {
  display: inline-flex; align-items: center;
  font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  padding: 2px 7px;
  border-radius: var(--r-pill);
  background: var(--hover); color: var(--text-muted);
}

/* Project collapse toggle */
.project-toggle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border-radius: var(--r-sm);
  color: var(--text-faint);
  background: transparent;
  flex-shrink: 0;
  transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.project-toggle:hover { background: var(--hover); color: var(--text-soft); }
.card.collapsed { padding-bottom: 18px; }
.card.collapsed .project-header { margin-bottom: 0; }

/* Selection checkbox */
.row-check {
  margin-top: 5px;
  width: 14px; height: 14px;
  border-radius: 3px;
  border: 1.5px solid var(--text-faint);
  background: transparent;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  opacity: 0;
  transition: opacity var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);
}
.row:hover .row-check,
.row[data-selected="true"] .row-check,
body[data-has-selection="true"] .row-check {
  opacity: 1;
}
.row-check:hover { border-color: var(--text-muted); }
.row-check[data-checked="true"] {
  background: var(--accent); border-color: var(--accent);
}
.row-check[data-checked="true"] svg { color: #fff; width: 9px; height: 9px; }
.row[data-selected="true"] {
  background: var(--accent-soft);
}
.row[data-selected="true"]:hover { background: var(--accent-soft); filter: brightness(.97); }

/* Bulk action bar */
.bulk-bar {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--surface);
  border-radius: var(--r-pill);
  padding: 6px 6px 6px 16px;
  box-shadow: var(--shadow-pop);
  display: flex; align-items: center; gap: 4px;
  z-index: 220;
  animation: toastIn var(--dur) var(--ease);
  font-size: 12.5px; font-weight: 500;
}
[data-theme="dark"] .bulk-bar { color: #1A1A19; }
.bulk-bar-count {
  padding-right: 8px;
  border-right: 1px solid rgba(255,255,255,.18);
  margin-right: 4px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
[data-theme="dark"] .bulk-bar-count { border-right-color: rgba(0,0,0,.18); }
.bulk-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border-radius: var(--r-pill);
  color: inherit;
  font-size: 12.5px; font-weight: 600;
  background: transparent;
  transition: background var(--dur-fast) var(--ease);
}
.bulk-btn:hover { background: rgba(255,255,255,.10); }
[data-theme="dark"] .bulk-btn:hover { background: rgba(0,0,0,.10); }
.bulk-btn.danger { color: #FCA5A5; }
.bulk-btn.danger:hover { background: rgba(248,113,113,.15); }
.bulk-btn svg { width: 12px; height: 12px; }

/* Owner avatar */
.avatar {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  color: #fff; flex-shrink: 0;
  transition: transform var(--dur-fast) var(--ease), filter var(--dur-fast) var(--ease);
  font-family: 'Inter', sans-serif;
  letter-spacing: 0;
  line-height: 1;
}
.avatar:hover { transform: scale(1.08); filter: brightness(1.05); }
.avatar.empty {
  background: transparent;
  border: 1px dashed var(--text-faint);
  color: var(--text-faint);
  opacity: 0;
  transition: opacity var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.row[data-empty-owner="true"]:hover .avatar.empty { opacity: 1; }
.avatar.empty:hover { border-color: var(--text-muted); color: var(--text-muted); }
.avatar.empty svg { width: 10px; height: 10px; }

/* Popover */
.popover {
  position: fixed;
  background: var(--surface-elev);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-pop);
  padding: 4px;
  min-width: 180px;
  z-index: 200;
  animation: popIn var(--dur-fast) var(--ease);
}
@keyframes popIn {
  from { opacity: 0; transform: translateY(-4px) scale(.98); }
  to   { opacity: 1; transform: none; }
}
.popover-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 7px 10px;
  border-radius: var(--r-sm);
  font-size: 12.5px; font-weight: 500;
  color: var(--text); text-align: left;
  transition: background var(--dur-fast) var(--ease);
}
.popover-item:hover { background: var(--hover); }
.popover-item > svg, .popover-item > span > svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--text-muted); }
.popover-item .label { flex: 1; }
.popover-item .check { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; }
.popover-input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--surface);
  color: var(--text);
  font-size: 13px; font-family: inherit;
  outline: none;
  transition: border-color var(--dur-fast) var(--ease);
}
.popover-input:focus { border-color: var(--accent); }
.popover-foot { display: flex; gap: 6px; justify-content: flex-end; padding: 4px 0 0; }
.popover-suggestions { display: flex; flex-direction: column; gap: 2px; padding-top: 4px; }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 300;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn var(--dur-fast) var(--ease);
}
[data-theme="dark"] .modal-backdrop { background: rgba(0,0,0,.6); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface-elev);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  box-shadow: var(--shadow-pop);
  padding: 24px;
  width: 100%; max-width: 420px;
  animation: popIn var(--dur) var(--ease);
}
.modal h2 { margin: 0 0 8px; font-size: 16px; font-weight: 700; }
.modal p { margin: 0 0 20px; font-size: 13.5px; color: var(--text-soft); line-height: 1.55; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
.btn-danger {
  background: var(--danger); color: #fff;
  padding: 8px 14px; border-radius: var(--r);
  font-size: 12.5px; font-weight: 600;
  transition: filter var(--dur-fast) var(--ease);
}
.btn-danger:hover { filter: brightness(.92); }

/* Toast */
.toast-host {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column-reverse; gap: 8px;
  z-index: 250;
  pointer-events: none;
}
.toast {
  background: var(--text); color: var(--surface);
  padding: 10px 12px 10px 16px;
  border-radius: var(--r-lg);
  font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-pop);
  pointer-events: auto;
  animation: toastIn var(--dur) var(--ease);

}
[data-theme="dark"] .toast { color: #1A1A19; }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: none; }
}
.toast.err { background: var(--danger); color: #fff; }
.toast-msg { flex: 1; }
.toast-btn {
  background: rgba(255,255,255,.12); color: inherit;

  border-radius: var(--r-sm);
  font-size: 12px; font-weight: 700;

}
.toast-btn:hover { background: rgba(255,255,255,.20); }
[data-theme="dark"] .toast-btn { background: rgba(0,0,0,.10); }
[data-theme="dark"] .toast-btn:hover { background: rgba(0,0,0,.18); }

/* Command palette */
.palette-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.40);
  z-index: 400;
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 12vh;
  animation: fadeIn var(--dur-fast) var(--ease);
}
[data-theme="dark"] .palette-backdrop { background: rgba(0,0,0,.6); }
.palette {
  background: var(--surface-elev);
  border: 1px solid var(--border);
  border-radius: var(--r-card);
  box-shadow: var(--shadow-pop);
  width: 100%; max-width: 540px;
  overflow: hidden;
  animation: popIn var(--dur) var(--ease);
}
.palette-input {
  width: 100%;
  padding: 16px 18px;
  border: none; border-bottom: 1px solid var(--border);
  background: transparent;
  font-size: 15px; color: var(--text);
  font-family: inherit; outline: none;
}
.palette-input::placeholder { color: var(--text-muted); }
.palette-list { max-height: 360px; overflow-y: auto; padding: 6px; }
.palette-empty { padding: 18px; text-align: center; color: var(--text-muted); font-size: 13px; }
.palette-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--r);
  text-align: left;

.palette-item.active { background: var(--accent-soft); color: var(--accent-text); }

.palette-item-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.palette-item-meta { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.palette-hint {
  border-top: 1px solid var(--border);
  padding: 8px 14px;
  font-size: 11px; color: var(--text-muted);
  display: flex; gap: 14px; flex-wrap: wrap;
}
.palette-hint kbd {
  font-family: ui-monospace, SFMono-Regular, monospace;
  font-size: 10.5px;
  padding: 1px 5px;
  background: var(--hover);

  border: 1px solid var(--border);

/* Drag indicators */
.drop-before { box-shadow: inset 0 2px 0 0 var(--accent); }
.drop-after  { box-shadow: inset 0 -2px 0 0 var(--accent); }
.drop-into   { background: var(--accent-soft) !important; outline: 1.5px dashed var(--accent); outline-offset: -2px; }

/* Project list spacing */
.project-list { display: flex; flex-direction: column; gap: 20px; }

/* Per-owner tab bar */
.user-tabs {
  display: inline-flex; gap: 2px;
  padding: 3px;
  background: var(--surface-elev);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  margin: 8px 0 28px;
}
.user-tab {
  padding: 7px 18px;

.user-tab:hover { color: var(--text-soft); }

  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm, 0 1px 2px rgba(0,0,0,.06));

/* Highlight after palette jump */
.highlight-flash { animation: flash 1.5s var(--ease); }
@keyframes flash {
  0%   { background: var(--accent-soft); }
  100% { background: transparent; }
}

/* Mobile gate */
.mobile-gate {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px; text-align: center;
}
.mobile-gate-card {
  background: var(--surface);

  border-radius: var(--r-card);
  box-shadow: var(--shadow-1);

.mobile-gate p { margin: 0; font-size: 13.5px; color: var(--text-soft); line-height: 1.55; }
.mobile-gate-icon { font-size: 28px; margin-bottom: 12px; }

/* Loading */
.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; color: var(--text-muted); font-size: 13px; gap: 14px;
}
.spinner {
  width: 26px; height: 26px;
  border: 2.5px solid var(--border); border-top-color: var(--accent);

}
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty-state {
  background: var(--surface);
  border: 1px dashed var(--border-strong);
  border-radius: var(--r-card);

}
.empty-state h2 { margin: 0 0 8px; font-size: 15px; color: var(--text); font-weight: 700; }
.empty-state p { margin: 0 0 18px; font-size: 13px; }

/* Status SVG glyphs — drawn with stroke/fill currentColor */
function StatusGlyph({ status, className }) {
  const cls = "status-icon " + (className || "");
  const color = ITEM_STATUS_COLOR[status] || ITEM_STATUS_COLOR.pending;
  const stroke = { stroke: "currentColor", fill: "none", strokeWidth: 1.5 };
  switch (status) {
    case "done":

          <circle cx="7" cy="7" r="5.5" fill="none" stroke="currentColor" strokeWidth="1.5" strokeDasharray="2 2"/>

/* ============================================================
   UTIL
   ============================================================ */
const gid = (prefix="id") => prefix + "-" + Math.random().toString(36).slice(2, 10);
const nowISO = () => new Date().toISOString();
function emptyArea(name="New area") { return { id: gid("a"), name, description: "", items: [] }; }
function emptyItem(status="pending") { return { id: gid("i"), text: "", status, owner: "", notes: "", dueDate: "", updatedAt: nowISO() }; }
function emptyProject() {
  return {
    id: gid("p"), name: "New project", status: "On track",
    nextMilestone: "", eta: "", description: "", archived: false,
    sortOrder: 0, areas: [], updatedAt: nowISO(),
  };
}

const USERS = [
  { id: "sidney",  label: "Sidney" },
  { id: "ludmila", label: "Ludmila" },
];
// Project ownership is encoded in the project ID prefix so the sheet schema
// doesn't have to change: ids starting with "ludmila-" belong to Ludmila,
// everything else belongs to Sidney.
function ownerOf(project) {
  return String(project?.id || "").startsWith("ludmila-") ? "ludmila" : "sidney";
}
function withOwner(project, owner) {
  const id = String(project.id || "");
  const stripped = id.replace(/^ludmila-/, "");
  return { ...project, id: owner === "ludmila" ? "ludmila-" + stripped : stripped };
}

function hashString(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
  return Math.abs(h);
}
function initialsOf(name) {
  const parts = String(name||"").trim().split(/\s+/);
  if (!parts[0]) return "";
  return (parts[0][0] + (parts[1]?.[0] || "")).toUpperCase();
}
function avatarColor(name, dark) {
  const hue = hashString(name) % 360;
  return `hsl(${hue}, 55%, ${dark ? 50 : 42}%)`;
}

/* ============================================================
   Legacy text → structured parser  (PRESERVED)
   ============================================================ */
const ITEM_STATUS_FROM_MARKER = {
  "✓": "done", "○": "in_progress", "⏸": "waiting",
  "→": "in_progress", "·": "pending", "…": "to_plan", "•": "pending",

const TAG_TO_STATUS = {
  "DONE": "done", "WAITING": "waiting", "PENDING": "pending",
  "IN PROGRESS": "in_progress", "TO PLAN": "to_plan", "BLOCKER": "blocker",
};
function looksLikeOwner(s) {
  if (!s) return false;
  const t = s.trim();
  if (!t || t.length > 30) return false;
  if (/[.!?]$/.test(t)) return false;
  if (/\.\s/.test(t)) return false;
  if (/^(via|for|the|and|or|on|in|at|with|every|each)\b/i.test(t)) return false;
  return true;
}
function stripMdEscapes(s) { return s.replace(/\\([\[\]\\_*])/g, "$1"); }
function splitOwner(text) {
  const parts = text.split(/\s+—\s+/);
  if (parts.length < 2) return { text, owner: "" };
  for (let i = parts.length - 1; i >= 1; i--) {
    const candidate = parts.slice(i).join(" — ").trim();
    if (looksLikeOwner(candidate)) {
      return { text: parts.slice(0, i).join(" — ").trim(), owner: candidate };
    }
  }
  return { text, owner: "" };
}
function parseSectionText(text) {
  if (!text || typeof text !== "string") return [];
  const lines = text
    .split(/\r?\n|(?:[ \t]{3,})/g)
    .map(l => stripMdEscapes(l).trim())
    .filter(Boolean);
  if (!lines.length) return [];
  const areas = [];
  let current = null;
  for (const raw of lines) {
    let line = raw;
    let status = null;
    const first = line.charAt(0);
    if (ITEM_STATUS_FROM_MARKER[first]) {
      status = ITEM_STATUS_FROM_MARKER[first];
      line = line.slice(1).trim();
    }
    const tagMatch = line.match(/^\[(DONE|WAITING|PENDING|IN PROGRESS|TO PLAN|BLOCKER)\]\s*/i);
    if (tagMatch) {
      status = TAG_TO_STATUS[tagMatch[1].toUpperCase()] || status;
      line = line.slice(tagMatch[0].length).trim();
    }
    if (status) {
      const split = splitOwner(line);
      if (!current) { current = emptyArea("Items"); areas.push(current); }
      current.items.push({ id: gid("i"), text: split.text, status, owner: split.owner });
    } else {
      current = emptyArea(line);
      areas.push(current);
    }
  }
  return areas.filter((a, i) => a.items.length > 0 || i === areas.length - 1);
}

/* ============================================================
   Normalize / repair / migrate  (preserved + extended)
   ============================================================ */
function repairArea(a) { return { ...a, items: a.items.map(repairItem) }; }
function repairItem(it) {
  if (it.owner && !looksLikeOwner(it.owner)) {
    return { ...it, text: (it.text + (it.text ? " — " : "") + it.owner).trim(), owner: "" };
  }
  return it;
}
function normalizeArea(a, i=0) {
  return {
    id: String(a?.id || gid("a")),
    name: String(a?.name ?? `Area ${i+1}`),
    description: String(a?.description ?? ""),
    items: Array.isArray(a?.items) ? a.items.map(normalizeItem) : [],
  };
}
function normalizeItem(it) {
  return {
    id: String(it?.id || gid("i")),
    text: String(it?.text ?? ""),
    status: ITEM_STATUSES.includes(it?.status) ? it.status : "pending",
    owner: String(it?.owner ?? ""),
    notes: String(it?.notes ?? ""),
    dueDate: String(it?.dueDate ?? ""),
    updatedAt: String(it?.updatedAt ?? ""),
  };
}
function migrateSection(value) {
  if (Array.isArray(value)) return value.map(normalizeArea).map(repairArea);
  if (typeof value === "string") {
    const trimmed = value.trim();
    if (!trimmed) return [];
    if (trimmed.startsWith("[") || trimmed.startsWith("{")) {
      try {
        const parsed = JSON.parse(trimmed);
        if (Array.isArray(parsed)) return parsed.map(normalizeArea).map(repairArea);
      } catch {}
    }
    return parseSectionText(trimmed).map(repairArea);
  }
  return [];
}

/* NEW: collapse the three legacy section fields into one areas list */
function mergeLegacySections(p) {
  if (Array.isArray(p?.areas) && p.areas.length > 0) {
    return p.areas.map(normalizeArea).map(repairArea);
  }
  const a1 = migrateSection(p?.whatsBeenDone);
  const a2 = migrateSection(p?.workingOnNow);
  const a3 = migrateSection(p?.blockers);
  const merged = [];
  const indexByName = new Map();
  for (const a of [...a1, ...a2, ...a3]) {
    const key = a.name.trim().toLowerCase();
    if (key && indexByName.has(key)) {
      merged[indexByName.get(key)].items.push(...a.items);
    } else {
      if (key) indexByName.set(key, merged.length);
      merged.push(a);
    }
  }
  return merged.filter(a => a.name.trim() || a.items.length > 0);
}

function normalizeProject(p, i=0) {
  return {
    id: String(p?.id || gid("p")),
    name: String(p?.name || "Untitled"),
    status: PROJECT_STATUSES.includes(p?.status) ? p.status : "On track",
    nextMilestone: String(p?.nextMilestone ?? ""),
    eta: String(p?.eta ?? ""),
    description: String(p?.description ?? ""),
    archived: p?.archived === true || p?.archived === "TRUE" || p?.archived === "true",
    updatedAt: String(p?.updatedAt ?? ""),
    sortOrder: Number(p?.sortOrder) || i + 1,
    areas: mergeLegacySections(p),
  };
}

function serializeForSheet(projects) {
  return projects.map(p => ({

  }));
}

/* ============================================================
   THEME
   ============================================================ */
function applyTheme(mode) {
  const resolved = mode === "system"
    ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
    : mode;
  document.documentElement.setAttribute("data-theme", resolved);
}
function useTheme() {
  const [mode, setMode] = React.useState(() => {
    try { return localStorage.getItem(KEY_THEME) || "system"; } catch { return "system"; }
  });
  React.useEffect(() => {
    applyTheme(mode);
    try { localStorage.setItem(KEY_THEME, mode); } catch {}
    if (mode !== "system") return;
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const handler = () => applyTheme("system");
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, [mode]);
  const resolved = mode === "system"
    ? (typeof window !== "undefined" && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
    : mode;
  return [mode, setMode, resolved];
}

   Hooks

const { useState, useEffect, useCallback, useRef, useMemo, useContext, useLayoutEffect } = React;
const DragCtx = React.createContext(null);

function useOutsideClick(ref, onOutside) {
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) onOutside(); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [ref, onOutside]);
}

function useAutoResize(ref, value) {
  useLayoutEffect(() => {
    const el = ref.current; if (!el) return;
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
  }, [ref, value]);
}

function useViewportWidth() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1280);
  useEffect(() => {
    const onResize = () => setW(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return w;
}

const CollapsedCtx = React.createContext({ map: {}, toggle: () => {}, setMany: () => {} });
const SelectionCtx = React.createContext({ has: () => false, toggle: () => {}, clear: () => {}, count: 0 });
const ItemOpsCtx = React.createContext({ copyLink: () => {}, duplicate: () => {}, move: () => {}, getProjects: () => [] });

function useCollapsedStore() {
  const [map, setMap] = useState(() => readJSON(KEY_COLLAPSED, {}));
  return useMemo(() => ({
    map,
    toggle: (id) => setMap(prev => {
      const next = { ...prev };
      if (next[id]) delete next[id]; else next[id] = true;
      writeJSON(KEY_COLLAPSED, next);
      return next;
    }),
    setMany: (ids, value) => setMap(prev => {
      const next = { ...prev };
      for (const id of ids) { if (value) next[id] = true; else delete next[id]; }
      writeJSON(KEY_COLLAPSED, next);
      return next;
    }),
  }), [map]);
}

function useCollapsed(areaId) {
  const store = useContext(CollapsedCtx);
  return [
    !!store.map[areaId],
    useCallback(() => store.toggle(areaId), [store, areaId]),
    store.setMany,
  ];
}

function useFilterForProject(projectId) {
  const [map, setMap] = useState(() => readJSON(KEY_FILTER, {}));
  const value = map[projectId] || "all";
  const setValue = useCallback((v) => {
    setMap(prev => {
      const next = { ...prev };
      if (!v || v === "all") delete next[projectId]; else next[projectId] = v;
      writeJSON(KEY_FILTER, next);
      return next;
    });
  }, [projectId]);
  return [value, setValue];
}

/* ============================================================
   Popover positioner (fixed, viewport-bounded)
   ============================================================ */
function positionPopover(anchorRect, popEl, prefer = "below") {
  if (!popEl) return {};
  const margin = 6;
  const vw = window.innerWidth, vh = window.innerHeight;
  const pw = popEl.offsetWidth, ph = popEl.offsetHeight;
  let top = prefer === "below" ? anchorRect.bottom + margin : anchorRect.top - ph - margin;
  let left = anchorRect.left;
  if (left + pw > vw - 12) left = Math.max(12, vw - pw - 12);
  if (top + ph > vh - 12) top = Math.max(12, anchorRect.top - ph - margin);
  if (top < 12) top = 12;
  return { top: top + "px", left: left + "px" };
}

function ConfirmDialog({ title, message, confirmLabel="Delete", onConfirm, onCancel }) {
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onCancel();
      if (e.key === "Enter") onConfirm();
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [onConfirm, onCancel]);
  return (
    <div className="modal-backdrop" onMouseDown={(e)=>{ if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="dlg-title">
        <h2 id="dlg-title">{title}</h2>
        <p>{message}</p>
        <div className="modal-actions">
          <button type="button" className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button type="button" className="btn-danger" onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   Toast host
   ============================================================ */
function ToastHost({ toasts, dismiss }) {
  return (
    <div className="toast-host">
      {toasts.map(t => (
        <div key={t.id} className={`toast${t.err?" err":""}`}>
          <span className="toast-msg">{t.msg}</span>
          {t.action && (
            <button type="button" className="toast-btn" onClick={()=>{ t.action.onClick(); dismiss(t.id); }}>
              {t.action.label}
            </button>
          )}
        </div>
      ))}
    </div>
  );
}

/* ============================================================
   Command palette
   ============================================================ */
function CommandPalette({ projects, onClose, onAddProject, onJump }) {
  const [q, setQ] = useState("");
  const [active, setActive] = useState(0);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  const results = useMemo(() => {
    const query = q.trim();
    if (!query || query.startsWith("/")) return [];
    const lc = query.toLowerCase();
    const out = [];
    for (const p of projects) {
      if (p.name.toLowerCase().includes(lc)) {
        out.push({ kind: "project", label: p.name, meta: "Project", projectId: p.id });
      }
      for (const a of p.areas) {
        if (a.name.toLowerCase().includes(lc)) {
          out.push({ kind: "area", label: a.name, meta: p.name, projectId: p.id, areaId: a.id });
        }
        for (const it of a.items) {
          if (it.text && it.text.toLowerCase().includes(lc)) {
            out.push({ kind: "item", label: it.text, meta: `${p.name} · ${a.name}`, projectId: p.id, areaId: a.id, itemId: it.id });
          }
        }
      }
      if (out.length > 40) break;
    }
    return out.slice(0, 40);
  }, [q, projects]);

  useEffect(() => { setActive(0); }, [q]);

  const trigger = (i) => {
    if (q.trim().startsWith("/p ")) {
      const name = q.slice(3).trim();
      if (name) { onAddProject(name); onClose(); }
      return;
    }
    const r = results[i];
    if (!r) return;
    onJump(r);
    onClose();
  };

  return (
    <div className="palette-backdrop" onMouseDown={(e)=>{ if (e.target === e.currentTarget) onClose(); }}>
      <div className="palette" role="dialog" aria-label="Command palette">
        <input
          ref={inputRef}
          className="palette-input"
          value={q}
          placeholder="Search projects, areas, items — or `/p Name` to add a project"
          onChange={e=>setQ(e.target.value)}
          onKeyDown={e=>{
            if (e.key === "Escape") onClose();
            else if (e.key === "ArrowDown") { e.preventDefault(); setActive(a => Math.min(results.length-1, a+1)); }
            else if (e.key === "ArrowUp")   { e.preventDefault(); setActive(a => Math.max(0, a-1)); }
            else if (e.key === "Enter")     { e.preventDefault(); trigger(active); }
          }}
        />
        <div className="palette-list">
          {q.trim().startsWith("/p ") ? (
            <button type="button" className="palette-item active" onClick={()=>trigger(0)}>
              <span className="palette-item-kind">New</span>
              <span className="palette-item-text">Create project "{q.slice(3).trim() || "Untitled"}"</span>
            </button>
          ) : results.length === 0 ? (
            <div className="palette-empty">
              {q.trim() ? "No matches." : "Type to search · `/p Name` to add a project"}
            </div>
          ) : (
            results.map((r, i) => (
              <button key={i} type="button"
                className={`palette-item${i===active?" active":""}`}
                onMouseEnter={()=>setActive(i)}
                onClick={()=>trigger(i)}>
                <span className="palette-item-kind">{r.kind}</span>
                <span className="palette-item-text">{r.label}</span>
                <span className="palette-item-meta">{r.meta}</span>
              </button>
            ))
          )}
        </div>
        <div className="palette-hint">
          <span><kbd>↑↓</kbd> navigate</span>
          <span><kbd>↵</kbd> open</span>
          <span><kbd>esc</kbd> close</span>
          <span><kbd>/p</kbd> new project</span>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   Theme toggle
   ============================================================ */
function ThemeToggle({ mode, setMode }) {
  const next = mode === "system" ? "light" : mode === "light" ? "dark" : "system";
  const Glyph = mode === "system" ? Icon.Monitor : mode === "light" ? Icon.Sun : Icon.Moon;
  const label = `Theme: ${mode}. Click for ${next}.`;
  return (
    <button type="button" className="iconbtn" aria-label={label} title={label}
      onClick={()=>setMode(next)}>
      <Glyph/>
    </button>
  );
}

/* ============================================================
   Inline edit primitives
   ============================================================ */
function ItemText({ value, onChange, onEnter, onBackspaceEmpty, autoFocus }) {
  const ref = useRef(null);
  useAutoResize(ref, value);
  useEffect(() => { if (autoFocus) ref.current?.focus(); }, [autoFocus]);
  return (
    <textarea ref={ref} className="row-text" rows={1}
      value={value}
      placeholder="Empty item"
      onChange={e=>onChange(e.target.value)}
      onKeyDown={e=>{
        if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); onEnter?.(); }
        else if (e.key === "Backspace" && !value) { onBackspaceEmpty?.(e); }
      }}/>
  );
}

/* ============================================================
   ItemRow
   ============================================================ */
function ItemRow({ projectId, areaId, item, onChange, onDelete, ownerSuggestions, dark, autoFocus, onEnter, highlight }) {
  const [drag, setDrag] = useContext(DragCtx);
  const selection = useContext(SelectionCtx);
  const itemOps = useContext(ItemOpsCtx);
  const [dropPos, setDropPos] = useState(null);
  const [statusOpen, setStatusOpen] = useState(false);
  const [moveOpen, setMoveOpen] = useState(false);
  const statusBtnRef = useRef(null);
  const moveBtnRef = useRef(null);
  const rowRef = useRef(null);
  const isSrc = drag?.kind === 'item' && drag.itemId === item.id;
  const selected = selection.has(item.id);

  const dragStart = (e) => {
    setDrag({ kind:'item', projectId, areaId, itemId: item.id });
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', item.id); } catch {}
    e.stopPropagation();
  };
  const dragOver = (e) => {
    if (drag?.kind !== 'item') return;
    e.preventDefault(); e.stopPropagation();
    const r = e.currentTarget.getBoundingClientRect();
    setDropPos((e.clientY - r.top) < r.height/2 ? 'before' : 'after');
  };
  const dragLeave = () => setDropPos(null);
  const drop = (e) => {
    if (drag?.kind !== 'item') return;
    e.preventDefault(); e.stopPropagation();
    const pos = dropPos; setDropPos(null);
    window.__pcDrop?.({ targetKind:'item', projectId, areaId, itemId: item.id, position: pos });
  };

  useEffect(() => {
    if (highlight && rowRef.current) {
      rowRef.current.classList.add("highlight-flash");
      const t = setTimeout(() => rowRef.current?.classList.remove("highlight-flash"), 1500);
      return () => clearTimeout(t);
    }
  }, [highlight]);

  return (
    <div
      ref={rowRef}
      data-empty-owner={!item.owner}
      data-selected={selected}
      className={`row ${isSrc?'dragging':''} ${dropPos==='before'?'drop-before':''} ${dropPos==='after'?'drop-after':''}`}
      onDragOver={dragOver}
      onDragLeave={dragLeave}
      onDrop={drop}
      data-item-id={item.id}>
      <button type="button" className="row-check"
        data-checked={selected}
        onClick={(e)=>{ e.stopPropagation(); selection.toggle(item.id, e); }}
        aria-label={selected ? "Deselect item" : "Select item"}
        title={selected ? "Deselect" : "Select (Shift+click for range)"}>
        {selected && <Icon.Check/>}
      </button>
      <div className="row-grip"
        draggable
        onDragStart={dragStart}
        onDragEnd={()=>{ setDrag(null); setDropPos(null); }}
        aria-label="Drag to reorder" title="Drag to reorder">
        <Icon.Grip/>
      </div>
      <div className="row-status">
        <button ref={statusBtnRef} type="button" className="row-status-btn"
          onClick={()=>setStatusOpen(o=>!o)}
          aria-label={`Status: ${ITEM_STATUS_LABEL[item.status]}. Click to change.`}>
          <StatusGlyph status={item.status}/>
        </button>
        {statusOpen && (
          <StatusPopover value={item.status} anchorRef={statusBtnRef}
            onChange={(s)=>onChange({ ...item, status: s })}
            onClose={()=>setStatusOpen(false)}/>
        )}
      </div>
      <ItemText
        value={item.text}
        onChange={(t)=>onChange({ ...item, text: t })}
        onEnter={onEnter}
        onBackspaceEmpty={(e)=>{ e.preventDefault(); onDelete(); }}
        autoFocus={autoFocus}
      />
      <div className="row-ind">
        <NotesButton value={item.notes}
          onChange={(n)=>onChange({ ...item, notes: n })}/>
        <DueDateChip value={item.dueDate}
          onChange={(d)=>onChange({ ...item, dueDate: d })}/>
      </div>
      <div className="row-owner">
        <OwnerAvatar value={item.owner}
          onChange={(o)=>onChange({ ...item, owner: o })}
          suggestions={ownerSuggestions}
          dark={dark}/>
      </div>
      <div className="row-kebab">
        <span ref={moveBtnRef}>
          <KebabMenu ariaLabel="Item actions" items={[
            { label: "Copy link", icon: <Icon.Link/>, onClick: () => itemOps.copyLink(item.id) },
            { label: "Duplicate", icon: <Icon.Copy/>, onClick: () => itemOps.duplicate(projectId, areaId, item.id) },
            { label: "Move to area…", icon: <Icon.MoveTo/>, onClick: () => setMoveOpen(true) },
          ]}/>
        </span>
        {moveOpen && (
          <MoveToAreaPicker
            projects={itemOps.getProjects()}
            sourceAreaId={areaId}
            anchorRef={moveBtnRef}
            onPick={(target)=>itemOps.move(projectId, areaId, item.id, target.projectId, target.areaId)}
            onClose={()=>setMoveOpen(false)}
          />
        )}
      </div>
      <div className="row-actions">
        <button type="button" className="iconbtn danger" onClick={onDelete} aria-label="Delete item" title="Delete">
          <Icon.X/>
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   AreaSection
   ============================================================ */
function AreaSection({ projectId, area, filter, onChange, onDelete, onDeleteItem, ownerSuggestions, dark, focusItemId, setFocusItemId, highlightItemId }) {
  const [collapsed, toggle] = useCollapsed(area.id);
  const [drag, setDrag] = useContext(DragCtx);
  const [dropPos, setDropPos] = useState(null);
  const isSrc = drag?.kind === 'area' && drag.areaId === area.id;

  const dragStart = (e) => {
    setDrag({ kind:'area', projectId, areaId: area.id });
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', area.id); } catch {}
    e.stopPropagation();
  };
  const dragOver = (e) => {
    if (!drag) return;
    e.preventDefault();
    if (drag.kind === 'item' && area.items.length === 0) { setDropPos('into'); return; }
    if (drag.kind !== 'area') return;
    const r = e.currentTarget.getBoundingClientRect();
    setDropPos((e.clientY - r.top) < r.height/2 ? 'before' : 'after');
  };
  const dragLeave = () => setDropPos(null);
  const drop = (e) => {
    if (!drag) return;
    e.preventDefault(); e.stopPropagation();
    const pos = dropPos; setDropPos(null);
    if (drag.kind === 'item' && pos === 'into') {
      window.__pcDrop?.({ targetKind:'area-empty', projectId, areaId: area.id });
    } else if (drag.kind === 'area') {
      window.__pcDrop?.({ targetKind:'area', projectId, areaId: area.id, position: pos });
    }
  };

  const updateItem = (i, updated) => onChange({ ...area, items: area.items.map((it, idx) => idx === i ? updated : it) });
  const deleteItem = (i) => {
    const item = area.items[i];
    if (item) onDeleteItem(item.id);
  };
  const addItem = (insertAfterIdx) => {
    const items = [...area.items];
    const ni = emptyItem();
    items.splice(insertAfterIdx == null ? items.length : insertAfterIdx + 1, 0, ni);
    setFocusItemId(ni.id);
    onChange({ ...area, items });
  };

  const filteredItems = useMemo(() => {
    if (!filter || filter === "all") return area.items;
    return area.items.filter(i => i.status === filter);
  }, [area.items, filter]);

  const counts = useMemo(() => ({
    done: area.items.filter(i => i.status === "done").length,
    total: area.items.length,
  }), [area.items]);

  if (filter && filter !== "all" && filteredItems.length === 0) return null;

  return (
    <section
      onDragOver={dragOver}
      onDragLeave={dragLeave}
      onDrop={drop}
      className={`area ${isSrc?'dragging':''} ${dropPos==='before'?'drop-before':''} ${dropPos==='after'?'drop-after':''} ${dropPos==='into'?'drop-into':''}`}
      data-area-id={area.id}>
      <div className="area-header">
        <div className="area-grip" draggable
          onDragStart={dragStart}
          onDragEnd={()=>{ setDrag(null); setDropPos(null); }}
          aria-label="Drag to reorder area" title="Drag to reorder area">
          <Icon.Grip style={{ width: 12, height: 12, color: "var(--text-faint)" }}/>
        </div>
        <button type="button" className={`area-caret${!collapsed?' open':''}`}
          onClick={toggle}
          aria-label={collapsed ? "Expand area" : "Collapse area"}
          aria-expanded={!collapsed}>
          <Icon.Chevron/>
        </button>
        <input className="area-name" value={area.name}
          placeholder="Area name"
          aria-label="Area name"
          onChange={e=>onChange({ ...area, name: e.target.value })}/>
        {counts.total > 0 && (
          <span className="area-count">{counts.done}/{counts.total}</span>
        )}
        <div className="area-actions">
          <button type="button" className="iconbtn" onClick={()=>addItem()} aria-label="Add item" title="Add item">
            <Icon.Plus/>
          </button>
          <KebabMenu ariaLabel="Area actions" items={[
            { label: "Rename", onClick: ()=>{
              const el = document.querySelector(`[data-area-id="${area.id}"] .area-name`);
              el?.focus(); el?.select();
            } },
            { label: "Add item", onClick: ()=>addItem() },
            { label: "Delete area", danger: true, onClick: ()=>onDelete() },
          ]}/>
        </div>
      </div>
      {!collapsed && (
        <>
        <input
          className={`area-description${area.description ? '' : ' hide-empty'}`}
          value={area.description || ""}
          placeholder="Add a short description for this area"
          onChange={e=>onChange({ ...area, description: e.target.value })}
        />
        <div className="area-body">
          {area.items.length === 0 ? (
            <div className="area-empty">
              No items yet — <button type="button" onClick={()=>addItem()}>add one</button>, or drop one here.
            </div>
          ) : (
            filteredItems.map((it) => {
              const realIdx = area.items.indexOf(it);
              return (
                <ItemRow key={it.id}
                  projectId={projectId} areaId={area.id}
                  item={it}
                  ownerSuggestions={ownerSuggestions}
                  dark={dark}
                  autoFocus={focusItemId === it.id}
                  highlight={highlightItemId === it.id}
                  onChange={(updated)=>updateItem(realIdx, updated)}
                  onDelete={()=>deleteItem(realIdx)}
                  onEnter={()=>addItem(realIdx)}
                />
              );
            })
          )}
        </div>
        </>
      )}
    </section>
  );
}

/* ============================================================
   FilterBar
   ============================================================ */
function FilterBar({ counts, active, onChange, onCollapseAll, onExpandAll }) {
  const chips = [
    { key: "all", label: "All", count: counts.total },
    ...ITEM_STATUSES.map(s => ({ key: s, label: ITEM_STATUS_LABEL[s], count: counts[s] || 0 })),
  ];
  return (
    <div className="filterbar">
      {chips.map(c => (
        <button key={c.key} type="button"
          className={`filter-chip${active === c.key ? " active" : ""}`}
          onClick={()=>onChange(active === c.key && c.key !== "all" ? "all" : c.key)}>
          {c.key !== "all" && <StatusGlyph status={c.key}/>}
          {c.label}
          {c.count > 0 && <span className="count">{c.count}</span>}
        </button>
      ))}
      <div className="filterbar-spacer"/>
      <button type="button" className="filterbar-aux" onClick={onExpandAll}>Expand all</button>
      <button type="button" className="filterbar-aux" onClick={onCollapseAll}>Collapse all</button>
    </div>
  );
}

/* ============================================================
   ProjectCard
   ============================================================ */
function ProjectCard({ project, onChange, onDelete, onDeleteItem, dark, focusState, setFocusState, requestConfirm, requestToast }) {
  const [drag, setDrag] = useContext(DragCtx);
  const [dropPos, setDropPos] = useState(null);
  const [filter, setFilter] = useFilterForProject(project.id);
  const [dragArmed, setDragArmed] = useState(false);
  const [, , setManyCollapsed] = useCollapsed("__placeholder__");
  const [projectCollapsed, setProjectCollapsed] = useCollapsed("project:" + project.id);

  const dragStart = (e) => {
    if (!dragArmed) { e.preventDefault(); return; }
    setDrag({ kind: 'project', projectId: project.id });
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', project.id); } catch {}
  };
  const dragOver = (e) => {
    if (drag?.kind !== 'project') return;
    e.preventDefault();
    const r = e.currentTarget.getBoundingClientRect();
    setDropPos((e.clientY - r.top) < r.height/2 ? 'before' : 'after');
  };
  const dragLeave = () => setDropPos(null);
  const drop = (e) => {
    if (drag?.kind !== 'project') return;
    e.preventDefault();
    const pos = dropPos; setDropPos(null);
    window.__pcDrop?.({ targetKind: 'project', projectId: project.id, position: pos });
  };

  const isSrc = drag?.kind === 'project' && drag.projectId === project.id;

  const ownerSuggestions = useMemo(() => {
    const all = (project.areas || []).flatMap(a => (a.items || []).map(i => (i.owner||"").trim())).filter(Boolean);
    return Array.from(new Set(all));
  }, [project]);

  const counts = useMemo(() => {
    const c = { total: 0 };
    for (const s of ITEM_STATUSES) c[s] = 0;
    for (const a of project.areas || []) for (const i of a.items || []) {
      c.total++;
      if (c[i.status] != null) c[i.status]++;
    }
    return c;
  }, [project]);

  const updateArea = (i, updated) => onChange({ ...project, areas: project.areas.map((a, idx) => idx === i ? updated : a) });
  const deleteArea = (i) => {
    const area = project.areas[i];
    requestConfirm({
      title: "Delete area?",
      message: `"${area.name || "Untitled area"}" and its ${area.items.length} item${area.items.length===1?"":"s"} will be permanently deleted.`,
      onConfirm: () => onChange({ ...project, areas: project.areas.filter((_, idx) => idx !== i) }),
    });
  };
  const addArea = () => {
    const a = emptyArea("");
    onChange({ ...project, areas: [...project.areas, a] });
    setTimeout(() => {
      const el = document.querySelector(`[data-area-id="${a.id}"] .area-name`);
      el?.focus();
    }, 30);
  };

  const onAllAreaIds = (project.areas || []).map(a => a.id);

  return (
    <div
      draggable={dragArmed}
      onDragStart={dragStart}
      onDragOver={dragOver}
      onDragLeave={dragLeave}
      onDrop={drop}
      onDragEnd={()=>{ setDrag(null); setDropPos(null); setDragArmed(false); }}
      className={`card ${isSrc?'dragging':''} ${dropPos==='before'?'drop-before':''} ${dropPos==='after'?'drop-after':''} ${project.archived?'archived':''} ${projectCollapsed?'collapsed':''}`}
      data-project-id={project.id}>
      <div className="project-header">
        <button type="button" className="project-toggle"
          onClick={()=>setProjectCollapsed(!projectCollapsed)}
          aria-label={projectCollapsed ? "Expand project" : "Collapse project"}
          aria-expanded={!projectCollapsed}
          title={projectCollapsed ? "Expand" : "Collapse"}>
          <Icon.Chevron style={{ width: 14, height: 14, transform: `rotate(${projectCollapsed ? 0 : 90}deg)`, transition: "transform var(--dur-fast) var(--ease)" }}/>
        </button>
        <div className="project-grip"
          onMouseDown={()=>setDragArmed(true)}
          onMouseUp={()=>setDragArmed(false)}
          title="Drag to reorder project"
          aria-label="Drag handle">
          <Icon.Grip style={{ width: 16, height: 16, color: "var(--text-faint)" }}/>
        </div>
        <input className="project-name" value={project.name}
          placeholder="Project name"
          aria-label="Project name"
          onChange={e=>onChange({ ...project, name: e.target.value })}/>
        <ProjectStatusBadge value={project.status}
          onChange={(s)=>onChange({ ...project, status: s })}/>
        {project.archived && <span className="archived-tag">Archived</span>}
        {counts.total > 0 && (
          <span className="project-meta-count">{counts.total} item{counts.total===1?"":"s"}</span>
        )}
        <KebabMenu ariaLabel="Project actions" items={[
          { label: "Add area", onClick: addArea },
          { label: "Duplicate project", onClick: () => {
            const dup = JSON.parse(JSON.stringify(project));
            dup.id = gid("p"); dup.name = project.name + " (copy)"; dup.sortOrder = (project.sortOrder || 0) + 0.5;
            dup.areas = dup.areas.map(a => ({ ...a, id: gid("a"), items: a.items.map(it => ({ ...it, id: gid("i") })) }));
            onChange(dup, { duplicate: true });
          } },
          { label: project.archived ? "Unarchive" : "Archive",
            onClick: () => onChange({ ...project, archived: !project.archived }) },
          { label: "Delete project", danger: true, onClick: () => requestConfirm({
            title: "Delete project?",
            message: `"${project.name}" and all its areas and items will be permanently deleted.`,
            onConfirm: () => onDelete(project.id),
          }) },
        ]}/>
      </div>

      {!projectCollapsed && (
      <textarea className="project-description" rows={1}
        value={project.description || ""}
        placeholder="Add a short description for this project"
        ref={el => { if (el) { el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; } }}
        onChange={e=>onChange({ ...project, description: e.target.value })}/>
      )}

      {!projectCollapsed && (
      <div className="meta-row">
        <div className="meta-field">
          <label className="meta-label">Next milestone</label>
          <input className="meta-input" value={project.nextMilestone}
            placeholder="The next visible deliverable"
            onChange={e=>onChange({ ...project, nextMilestone: e.target.value })}/>
        </div>
        <div className="meta-field">
          <label className="meta-label">Target date</label>
          <input type="date" className="meta-input meta-date" value={project.eta || ""}
            onChange={e=>onChange({ ...project, eta: e.target.value })}/>
        </div>
      </div>
      )}

      {!projectCollapsed && (
      <FilterBar counts={counts} active={filter} onChange={setFilter}
        onExpandAll={()=>setManyCollapsed(onAllAreaIds, false)}
        onCollapseAll={()=>setManyCollapsed(onAllAreaIds, true)}/>
      )}

      {!projectCollapsed && (
      <div className="areas">
        {(project.areas || []).map((a, i) => (
          <AreaSection key={a.id}
            projectId={project.id}
            area={a}
            filter={filter}
            ownerSuggestions={ownerSuggestions}
            dark={dark}
            focusItemId={focusState?.projectId === project.id ? focusState.itemId : null}
            setFocusItemId={(itemId) => setFocusState({ projectId: project.id, itemId })}
            highlightItemId={null}
            onChange={(updated)=>updateArea(i, updated)}
            onDelete={()=>deleteArea(i)}
            onDeleteItem={(itemId)=>onDeleteItem(project.id, a.id, itemId)}
          />
        ))}
        {(project.areas || []).length === 0 && (
          <div className="area-empty" style={{ paddingTop: 16 }}>
            No areas yet — <button type="button" onClick={addArea}>add one</button>.
          </div>
        )}
      </div>
      )}
    </div>
  );
}

/* ============================================================
   Move-to-area picker (per-item action)
   ============================================================ */
function MoveToAreaPicker({ projects, sourceAreaId, onPick, anchorRef, onClose }) {
  const ref = useRef(null);
  const inputRef = useRef(null);
  const [q, setQ] = useState("");
  const [active, setActive] = useState(0);
  const [pos, setPos] = useState({});
  useLayoutEffect(() => {
    const rect = anchorRef.current?.getBoundingClientRect();
    if (rect) setPos(positionPopover(rect, ref.current));
  }, [anchorRef]);
  useOutsideClick(ref, onClose);
  useEffect(() => { inputRef.current?.focus(); }, []);
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [onClose]);

  const options = useMemo(() => {
    const out = [];
    for (const p of projects || []) {
      for (const a of (p.areas||[])) {
        if (a.id === sourceAreaId) continue;
        out.push({ projectId: p.id, areaId: a.id, label: a.name || "Untitled area", meta: p.name });
      }
    }
    const lc = q.trim().toLowerCase();
    if (!lc) return out.slice(0, 20);
    return out.filter(o =>
      o.label.toLowerCase().includes(lc) || o.meta.toLowerCase().includes(lc)
    ).slice(0, 20);
  }, [projects, sourceAreaId, q]);

  useEffect(() => { setActive(0); }, [q]);

  return ReactDOM.createPortal(
    <div ref={ref} className="popover" style={{ ...pos, minWidth: 280, padding: 6 }}>
      <input ref={inputRef} className="popover-input" value={q}
        placeholder="Move to area…"
        onChange={e=>setQ(e.target.value)}
        onKeyDown={e=>{
          if (e.key === "ArrowDown") { e.preventDefault(); setActive(a => Math.min(options.length-1, a+1)); }
          else if (e.key === "ArrowUp") { e.preventDefault(); setActive(a => Math.max(0, a-1)); }
          else if (e.key === "Enter") {
            e.preventDefault();
            const o = options[active]; if (o) { onPick(o); onClose(); }
          }
        }}/>
      <div style={{ maxHeight: 260, overflowY: "auto", marginTop: 4 }}>
        {options.length === 0 ? (
          <div style={{ padding: 14, color: "var(--text-muted)", fontSize: 12.5, textAlign: "center" }}>No areas match.</div>
        ) : options.map((o, i) => (
          <button key={`${o.projectId}:${o.areaId}`} type="button"
            className="popover-item"
            style={i===active ? { background: "var(--accent-soft)", color: "var(--accent-text)" } : null}
            onMouseEnter={()=>setActive(i)}
            onClick={()=>{ onPick(o); onClose(); }}>
            <span className="label" style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              <span style={{ color: "var(--text-muted)" }}>{o.meta} ›</span> {o.label}
            </span>
          </button>
        ))}
      </div>
    </div>,
    document.body
  );
}
