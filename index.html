<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Central</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#F8FAFC;font-family:'Inter','Segoe UI',Arial,sans-serif;color:#0F172A;}
  select,input,textarea{font-family:inherit;}
  select{appearance:none;cursor:pointer;}
  button{cursor:pointer;transition:opacity .15s,background .15s;font-family:inherit;}
  button:hover{opacity:.85;}
  textarea{resize:vertical;}
  .card{background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);}
  .drag-over{outline:2px dashed #6366F1;outline-offset:-2px;background:#EEF2FF !important;}
  .toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;color:#fff;}
  .toast.show{opacity:1;}
  .field-input{width:100%;padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;color:#0F172A;outline:none;background:#FAFAFA;}
  .field-input:focus{border-color:#6366F1;background:#fff;}
  .field-label{display:block;font-weight:700;font-size:11px;color:#64748B;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const WEBHOOK_URL = "https://synchrosocial.app.n8n.cloud/webhook/project-central";
const SHEET_URL   = "https://docs.google.com/spreadsheets/d/1ZAGZBMoT1M3i9DndmhNwHurx6iW3i9ESXiMmrPvCB38/edit";
const STORAGE_KEY = "project-central:v2";

const STATUS_OPTIONS = ["On track","At risk","Blocked","Shipped"];
const STATUS_META = {
  "On track": {bg:"#DCFCE7", text:"#15803D", dot:"#16A34A"},
  "At risk":  {bg:"#FEF3C7", text:"#B45309", dot:"#D97706"},
  "Blocked":  {bg:"#FEE2E2", text:"#B91C1C", dot:"#DC2626"},
  "Shipped":  {bg:"#EDE9FE", text:"#6D28D9", dot:"#7C3AED"},
};

const EMPTY_PROJECT = () => ({
  id: "p-" + Math.random().toString(36).slice(2,9),
  name: "New project",
  status: "On track",
  whatsBeenDone: "",
  workingOnNow: "",
  blockers: "",
  nextMilestone: "",
  eta: "",
  sortOrder: 0,
});

async function apiLoad() {
  const r = await fetch(WEBHOOK_URL, { method: "GET" });
  if (!r.ok) throw new Error("Load failed: " + r.status);
  const d = await r.json();
  return Array.isArray(d.projects) ? d.projects : [];
}

async function apiSave(projects) {
  const r = await fetch(WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ projects }),
  });
  if (!r.ok) throw new Error("Save failed: " + r.status);
}

function loadLocal() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "null"); }
  catch { return null; }
}
function saveLocal(projects) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); } catch {}
}

function normalize(p, i) {
  return {
    id: String(p.id || ("p-" + i)),
    name: String(p.name || "Untitled"),
    status: STATUS_OPTIONS.includes(p.status) ? p.status : "On track",
    whatsBeenDone: String(p.whatsBeenDone || ""),
    workingOnNow: String(p.workingOnNow || ""),
    blockers: String(p.blockers || ""),
    nextMilestone: String(p.nextMilestone || ""),
    eta: String(p.eta || ""),
    sortOrder: Number(p.sortOrder) || i + 1,
  };
}

const { useState, useEffect, useCallback, useRef, useMemo } = React;

function StatusPill({ value, onChange }) {
  const m = STATUS_META[value] || STATUS_META["On track"];
  return (
    <div style={{position:"relative",display:"inline-flex",alignItems:"center"}}>
      <div style={{position:"absolute",left:10,width:8,height:8,borderRadius:"50%",background:m.dot,pointerEvents:"none",zIndex:1}}/>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{background:m.bg,color:m.text,border:"none",borderRadius:20,padding:"6px 14px 6px 24px",fontSize:12,fontWeight:700,outline:"none",cursor:"pointer"}}>
        {STATUS_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

function AutoTextarea({ value, onChange, placeholder, minRows=2 }) {
  const ref = useRef(null);
  useEffect(()=>{
    if (!ref.current) return;
    ref.current.style.height = "auto";
    ref.current.style.height = Math.max(ref.current.scrollHeight, minRows*22+18) + "px";
  }, [value, minRows]);
  return (
    <textarea ref={ref} className="field-input" rows={minRows}
      placeholder={placeholder} value={value}
      onChange={e=>onChange(e.target.value)}
      style={{lineHeight:"1.5",overflow:"hidden",whiteSpace:"pre-wrap"}}/>
  );
}

function Section({ label, children }) {
  return (
    <div style={{marginTop:14}}>
      <div className="field-label">{label}</div>
      {children}
    </div>
  );
}

function ProjectCard({ project, onChange, onDelete, dragHandlers, dragging }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  const set = (field) => (v) => onChange({ ...project, [field]: v });
  return (
    <div
      draggable={dragging}
      onDragStart={dragHandlers.onDragStart(project.id)}
      onDragOver={dragHandlers.onDragOver}
      onDrop={dragHandlers.onDrop(project.id)}
      onDragEnd={dragHandlers.onDragEnd}
      className="card"
      style={{padding:"20px 24px",marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span
          onMouseDown={()=>dragHandlers.setDragging(true)}
          onMouseUp={()=>dragHandlers.setDragging(false)}
          title="Drag to reorder"
          style={{color:"#CBD5E1",fontSize:18,cursor:"grab",userSelect:"none",lineHeight:1,padding:"0 4px"}}>⠿</span>
        <input
          value={project.name}
          onChange={e=>set("name")(e.target.value)}
          placeholder="Project name"
          style={{flex:1,minWidth:200,fontSize:18,fontWeight:700,border:"none",outline:"none",background:"transparent",padding:"4px 6px",borderRadius:6,color:"#0F172A"}}
          onFocus={e=>e.target.style.background="#F8FAFC"}
          onBlur={e=>e.target.style.background="transparent"}/>
        <StatusPill value={project.status} onChange={set("status")}/>
        {confirmDelete ? (
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontSize:12,color:"#64748B"}}>Delete?</span>
            <button onClick={()=>{onDelete(project.id);setConfirmDelete(false);}}
              style={{background:"#EF4444",color:"#fff",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:600}}>Yes</button>
            <button onClick={()=>setConfirmDelete(false)}
              style={{background:"#F1F5F9",color:"#475569",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:600}}>No</button>
          </div>
        ) : (
          <button onClick={()=>setConfirmDelete(true)} title="Delete project"
            style={{background:"none",border:"none",fontSize:16,color:"#CBD5E1",padding:6,borderRadius:6}}>🗑️</button>
        )}
      </div>

      <Section label="What's been done">
        <AutoTextarea value={project.whatsBeenDone} onChange={set("whatsBeenDone")}
          placeholder="Everything that's been shipped, built, or completed for this project…" minRows={3}/>
      </Section>

      <Section label="Working on now">
        <AutoTextarea value={project.workingOnNow} onChange={set("workingOnNow")}
          placeholder="Active work in flight." minRows={2}/>
      </Section>

      <Section label="Blockers or need from you">
        <AutoTextarea value={project.blockers} onChange={set("blockers")}
          placeholder="What's blocking progress or needs input from someone else." minRows={2}/>
      </Section>

      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12,marginTop:14}}>
        <div>
          <div className="field-label">Next milestone</div>
          <input className="field-input" value={project.nextMilestone}
            onChange={e=>set("nextMilestone")(e.target.value)}
            placeholder="The next visible deliverable."/>
        </div>
        <div>
          <div className="field-label">ETA</div>
          <input className="field-input" value={project.eta}
            onChange={e=>set("eta")(e.target.value)}
            placeholder="e.g. Fri / Mar 4 / 2w"/>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [ready, setReady] = useState(false);
  const [projects, setProjects] = useState([]);
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState({ show:false, msg:"", ok:true });
  const [dragId, setDragId] = useState(null);
  const [dragging, setDragging] = useState(false);
  const [sourceMsg, setSourceMsg] = useState("");
  const saveTimer = useRef(null);

  const flash = (msg, ok=true) => {
    setToast({show:true,msg,ok});
    setTimeout(()=>setToast(t=>({...t,show:false})), 2200);
  };

  useEffect(() => {
    (async () => {
      try {
        const remote = await apiLoad();
        if (remote && remote.length) {
          const norm = remote.map(normalize).sort((a,b)=>a.sortOrder-b.sortOrder);
          setProjects(norm);
          saveLocal(norm);
          setSourceMsg("Synced from Google Sheets");
        } else {
          const local = loadLocal();
          if (local && local.length) {
            setProjects(local);
            setSourceMsg("Loaded from local backup (sheet empty)");
          } else {
            const seed = [{ ...EMPTY_PROJECT(), name: "Ai Avatar", sortOrder: 1 }];
            setProjects(seed);
            setSourceMsg("Started a fresh project");
          }
        }
      } catch (e) {
        const local = loadLocal();
        if (local && local.length) {
          setProjects(local);
          setSourceMsg("Offline — using local backup");
          flash("⚠️ Couldn't reach n8n — working offline", false);
        } else {
          const seed = [{ ...EMPTY_PROJECT(), name: "Ai Avatar", sortOrder: 1 }];
          setProjects(seed);
          setSourceMsg("Offline — starting fresh");
          flash("⚠️ Couldn't reach n8n — working offline", false);
        }
      }
      setReady(true);
    })();
  }, []);

  const persist = useCallback((next) => {
    saveLocal(next);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setSaving(true);
    saveTimer.current = setTimeout(async () => {
      try {
        await apiSave(next);
        flash("✓ Saved");
      } catch (e) {
        flash("✗ Sheet save failed (kept local copy)", false);
      } finally {
        setSaving(false);
      }
    }, 900);
  }, []);

  const updateProject = (updated) => {
    const next = projects.map(p => p.id === updated.id ? updated : p);
    setProjects(next);
    persist(next);
  };

  const deleteProject = (id) => {
    const next = projects.filter(p => p.id !== id).map((p,i)=>({...p,sortOrder:i+1}));
    setProjects(next);
    persist(next);
  };

  const addProject = () => {
    const next = [...projects, { ...EMPTY_PROJECT(), sortOrder: projects.length + 1 }];
    setProjects(next);
    persist(next);
    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }), 50);
  };

  const dragHandlers = useMemo(() => ({
    setDragging,
    onDragStart: id => e => { setDragId(id); e.dataTransfer.effectAllowed = "move"; },
    onDragOver: e => { e.preventDefault(); e.currentTarget.classList.add("drag-over"); },
    onDrop: targetId => e => {
      e.preventDefault();
      e.currentTarget.classList.remove("drag-over");
      if (dragId === targetId || !dragId) return;
      const fi = projects.findIndex(p => p.id === dragId);
      const ti = projects.findIndex(p => p.id === targetId);
      if (fi < 0 || ti < 0) return;
      const next = [...projects];
      const [m] = next.splice(fi, 1);
      next.splice(ti, 0, m);
      const renumbered = next.map((p,i)=>({...p,sortOrder:i+1}));
      setProjects(renumbered);
      persist(renumbered);
    },
    onDragEnd: e => {
      setDragId(null);
      setDragging(false);
      document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
    },
  }), [dragId, projects, persist]);

  if (!ready) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",color:"#94A3B8",fontSize:14,gap:12}}>
      <div style={{width:32,height:32,border:"3px solid #E2E8F0",borderTop:"3px solid #6366F1",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      Loading from Google Sheets…
    </div>
  );

  const statusCounts = STATUS_OPTIONS.reduce((acc,s)=>{ acc[s]=projects.filter(p=>p.status===s).length; return acc; }, {});

  return (
    <div style={{minHeight:"100vh",padding:"28px 20px 60px"}}>
      <div className={`toast${toast.show?" show":""}`} style={{background:toast.ok?"#0F172A":"#EF4444"}}>{toast.msg}</div>

      <div style={{maxWidth:880,margin:"0 auto 24px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:8}}>
          <div>
            <div style={{fontSize:24,fontWeight:800,letterSpacing:"-.02em"}}>Project Central</div>
            <div style={{fontSize:12,color:"#94A3B8",marginTop:4}}>
              {projects.length} project{projects.length===1?"":"s"} · {saving ? "saving…" : "all changes saved"}
              {sourceMsg && <span style={{marginLeft:8,color:"#CBD5E1"}}>· {sourceMsg}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <a href={SHEET_URL} target="_blank" rel="noreferrer"
              style={{fontSize:12,color:"#6366F1",textDecoration:"none",padding:"6px 12px",borderRadius:8,border:"1px solid #E2E8F0",background:"#fff",fontWeight:600}}>
              📊 Sheet
            </a>
            <button onClick={addProject}
              style={{background:"#6366F1",color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",fontSize:13,fontWeight:600}}>+ Add Project</button>
          </div>
        </div>

        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
          {STATUS_OPTIONS.map(s => {
            const m = STATUS_META[s];
            const n = statusCounts[s];
            if (!n) return null;
            return (
              <div key={s} style={{display:"inline-flex",alignItems:"center",gap:6,background:m.bg,color:m.text,padding:"4px 10px",borderRadius:14,fontSize:11,fontWeight:700}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:m.dot}}/>
                {s} · {n}
              </div>
            );
          })}
        </div>

        {projects.map(p => (
          <ProjectCard key={p.id} project={p}
            onChange={updateProject} onDelete={deleteProject}
            dragHandlers={dragHandlers} dragging={dragging}/>
        ))}

        {projects.length === 0 && (
          <div className="card" style={{padding:40,textAlign:"center",color:"#94A3B8",fontSize:14}}>
            No projects yet. Click <strong>+ Add Project</strong> to get started.
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
