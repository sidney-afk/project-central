async function loadData() {
  if (!JSONBIN_ID || !JSONBIN_KEY) return null;
  const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
    headers: { "X-Master-Key": JSONBIN_KEY }
  });
  if (!r.ok) throw new Error(`Load failed: ${r.status}`);
  const d = await r.json();
  if (!d.record || !d.record.pipeline) return null;
  return d.record;
}

async function saveData(data) {
  if (!JSONBIN_ID || !JSONBIN_KEY) return;
  const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
    method: "PUT",
    headers: { "X-Master-Key": JSONBIN_KEY, "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`Save failed: ${r.status}`);
}

function StatusPill({ value, onChange, options=STATUS_OPTIONS, meta=STATUS_META }) {
  const m = meta[value]||{bg:"#F1F5F9",text:"#64748B",dot:"#94A3B8"};
  return (
    <div style={{position:"relative",display:"inline-flex",alignItems:"center"}}>
      <div style={{position:"absolute",left:8,width:7,height:7,borderRadius:"50%",background:m.dot,pointerEvents:"none",zIndex:1}}/>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{background:m.bg,color:m.text,border:"none",borderRadius:20,padding:"4px 10px 4px 20px",fontSize:11,fontWeight:600,outline:"none"}}>
        {options.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

function TaskRow({ t, onStatusChange, onEdit, onDelete, dragHandlers }) {
  const [draggable, setDraggable] = useState(false);
  const col=t.status==="DONE"?"#16A34A":t.status==="WAITING"?"#DC2626":t.status==="PENDING"?"#D97706":t.status==="IN PROGRESS"?"#7C3AED":"#334155";
  return (
    <div draggable={draggable}
      onDragStart={dragHandlers.onDragStart(t.id)} onDragOver={dragHandlers.onDragOver}
      onDrop={dragHandlers.onDrop(t.id)} onDragEnd={e=>{setDraggable(false);dragHandlers.onDragEnd(e);}}

      style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,border:"1px solid #F1F5F9",background:"#fff",cursor:"default"}}>

  );
}

    onDrop:targetId=>e=>{
      e.preventDefault();e.currentTarget.classList.remove("drag-over");
      if(dragId===targetId)return;
      const fi=areaTasks.findIndex(t=>t.id===dragId),ti=areaTasks.findIndex(t=>t.id===targetId);
      const r=[...areaTasks];const[m]=r.splice(fi,1);r.splice(ti,0,m);
      onReorder(area,r.map((t,i)=>({...t,order:i+1})));
    },
    onDragEnd:e=>{setDragId(null);e.currentTarget.classList.remove("drag-over");},
  };
  return (
    <div style={{marginBottom:16}}>
      <div onClick={()=>setCollapsed(c=>!c)} style={{display:"flex",alignItems:"center",gap:10,marginBottom:collapsed?0:6,cursor:"pointer",userSelect:"none"}}>
        <div style={{width:4,height:18,borderRadius:2,background:color,flexShrink:0}}/>
        <div style={{fontWeight:700,fontSize:13}}>{area}</div>
        <div style={{fontSize:11,color:"#94A3B8"}}>{doneCnt}/{areaTasks.length} done</div>
        <div style={{flex:1,height:1,background:`linear-gradient(to right,${color}33,transparent)`}}/>
        <span style={{fontSize:11,color:"#94A3B8"}}>{collapsed?"▶":"▼"}</span>
      </div>
      {!collapsed&&(
        <div style={{display:"flex",flexDirection:"column",gap:4,paddingLeft:14}}>
          {areaTasks.map(t=><TaskRow key={t.id} t={t} onStatusChange={onStatusChange} onEdit={onEdit} onDelete={onDelete} dragHandlers={dh}/>)}
        </div>
      )}
    </div>
  );
}

function App() {

  const [tasks,setTasks]=useState([]);

  const [focusEditing,setFocusEditing]=useState(false);

  const [addTOpen,setAddTOpen]=useState(false);
  const [editP,setEditP]=useState(null);
  const [editT,setEditT]=useState(null);
  const [pf,setPf]=useState({title:"",desc:"",done:false,link:""});
  const [tf,setTf]=useState({area:"N8N",task:"",status:"PENDING",who:"",link:"",position:"bottom"});

  const flash=(msg,ok=true)=>{setToast({show:true,msg,ok});setTimeout(()=>setToast(t=>({...t,show:false})),2200);};

  useEffect(()=>{
    (async()=>{
      try {
        const data = await loadData();
        if(data){

          setTasks(data.tasks);
          setQuicklinks(data.quicklinks||INIT_QUICKLINKS);
          setCustomAreas(data.customAreas||[]);
          setFocusText(data.focusText||"");
        } else {
          setPipeline(INIT_PIPELINE);
          setTasks(INIT_TASKS);
          setQuicklinks(INIT_QUICKLINKS);
          await saveData({pipeline:INIT_PIPELINE,tasks:INIT_TASKS,quicklinks:INIT_QUICKLINKS,focusText:""});
        }
      } catch(e) {
        setPipeline(INIT_PIPELINE);
        setTasks(INIT_TASKS);
        setQuicklinks(INIT_QUICKLINKS);
        flash("⚠️ Couldn't connect — working offline",false);
      }
      setReady(true);
    })();
  },[]);

  const debouncedSave = useCallback((data)=>{
    if(saveTimer.current) clearTimeout(saveTimer.current);
    setSaving(true);
    saveTimer.current = setTimeout(async()=>{
      try {
        await saveData(data);
        flash("✓ Saved");
      } catch(e){ flash("✗ Save failed",false); }
      setSaving(false);
    }, 800);
  },[]);

  const doSaveP=useCallback((data,t)=>{ setPipeline(data); debouncedSave({pipeline:data,tasks:t,quicklinks,focusText,customAreas}); },[debouncedSave,quicklinks,focusText,customAreas]);
  const doSaveT=useCallback((p,data)=>{ setTasks(data); debouncedSave({pipeline:p,tasks:data,quicklinks,focusText,customAreas}); },[debouncedSave,quicklinks,focusText,customAreas]);
  const doSaveQL=useCallback((data)=>{ setQuicklinks(data); debouncedSave({pipeline,tasks,quicklinks:data,focusText,customAreas}); },[debouncedSave,pipeline,tasks,focusText,customAreas]);
  const doSaveCA=useCallback((data)=>{ setCustomAreas(data); debouncedSave({pipeline,tasks,quicklinks,focusText,customAreas:data}); },[debouncedSave,pipeline,tasks,quicklinks,focusText]);

  const nextId=arr=>Math.max(0,...arr.map(x=>x.id))+1;
  const areas=[...new Set([...AREA_ORDER,...customAreas,...tasks.map(t=>t.area)])];

  // Scroll to area when navigating from progress section
  useEffect(()=>{
    if(tab==="tasks"&&scrollToArea){
      const id=`area-${scrollToArea.replace(/[^a-zA-Z0-9]/g,"-")}`;
      const attempt=()=>{ const el=document.getElementById(id); if(el){el.scrollIntoView({behavior:"smooth",block:"start"});setScrollToArea(null);} };
      setTimeout(attempt,80);
    }
  },[tab,scrollToArea]);

  function submitP(){
    if(!pf.title.trim())return;
    const u=editP?pipeline.map(x=>x.id===editP.id?{...x,...pf,link:pf.link||""}:x):[...pipeline,{id:nextId(pipeline),...pf,link:pf.link||""}];
    doSaveP(u,tasks);setPf({title:"",desc:"",done:false,link:""});setAddPOpen(false);setEditP(null);
  }
  function submitT(){
    if(!tf.task.trim())return;
    let u;
    if(editT){
      u=tasks.map(x=>x.id===editT.id?{...x,area:tf.area,task:tf.task,status:tf.status,who:tf.who,link:tf.link||""}:x);
    } else {
      const at=tasks.filter(t=>t.area===tf.area).sort((a,b)=>a.order-b.order);
      const pos=tf.position==="top"?0:tf.position==="bottom"?at.length:parseInt(tf.position)-1;
      const nt={id:nextId(tasks),area:tf.area,task:tf.task,status:tf.status,who:tf.who,link:tf.link||"",order:pos+1};
      const ins=[...at];ins.splice(pos,0,nt);
      const ren=ins.map((t,i)=>({...t,order:i+1}));
      u=[...tasks.filter(t=>t.area!==tf.area),...ren];
    }
    doSaveT(pipeline,u);setTf({area:"N8N",task:"",status:"PENDING",who:"",link:"",position:"bottom"});setAddTOpen(false);setEditT(null);
  }
  const selAreaTasks=tasks.filter(t=>t.area===tf.area).sort((a,b)=>a.order-b.order);
  const posOpts=[
    {value:"top",label:"Top (position 1)"},
    ...selAreaTasks.map((t,i)=>({value:String(i+2),label:`After: "${t.task.slice(0,38)}${t.task.length>38?"…":""}"`})),
    {value:"bottom",label:"Bottom (last)"},

  const pDone=pipeline.filter(p=>p.done).length;

  const tWait=tasks.filter(t=>t.status==="WAITING").length;

  if(!ready) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",color:"#94A3B8",fontSize:14,gap:12}}>

    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#F8FAFC",padding:"24px 20px"}}>
      <div className={`toast${toast.show?" show":""}`} style={{background:toast.ok?"#0F172A":"#EF4444",color:"#fff"}}>{toast.msg}</div>

      <div style={{maxWidth:1400,margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>

          <div style={{fontSize:13,color:"#94A3B8",marginTop:2}}>Client Acquisition & Onboarding · {saving?"saving…":"all changes saved"}</div>
        </div>
        <div style={{fontSize:12,color:"#CBD5E1",background:"#fff",padding:"6px 14px",borderRadius:20,border:"1px solid #E2E8F0"}}>
          {new Date().toLocaleDateString("en-US",{weekday:"short",year:"numeric",month:"short",day:"numeric"})}

      </div>

      <div style={{maxWidth:1400,margin:"0 auto 12px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        {[
          {label:"Pipeline Progress",val:`${pDone}/${pipeline.length}`,sub:"steps complete",color:"#6366F1"},
          {label:"Tasks Complete",   val:`${tDone}/${tasks.length}`,   sub:`${tasks.length?Math.round(tDone/tasks.length*100):0}% done`, color:"#10B981"},
          {label:"Waiting",          val:tWait,                        sub:"tasks on hold", color:"#F59E0B"},
        ].map(s=>(
          <div key={s.label} className="card" style={{padding:"16px 18px",borderTop:`3px solid ${s.color}`}}>
            <div style={{fontSize:26,fontWeight:800,color:s.color}}>{s.val}</div>
            <div style={{fontSize:12,fontWeight:600,marginTop:2}}>{s.label}</div>
            <div style={{fontSize:11,color:"#94A3B8"}}>{s.sub}</div>
          </div>

      </div>

      <div style={{maxWidth:1400,margin:"0 auto 12px",borderRadius:14,overflow:"hidden",background:"linear-gradient(135deg,#1e1b4b 0%,#312e81 60%,#4338ca 100%)",position:"relative",minHeight:130}}>
        <button onClick={()=>{setFocusDraft(focusText);setFocusEditing(true);}}
          style={{position:"absolute",top:12,right:12,background:"rgba(255,255,255,.08)",border:"none",borderRadius:8,color:"rgba(255,255,255,.4)",cursor:"pointer",fontSize:13,padding:"5px 8px",lineHeight:1,zIndex:2}}>✏️</button>
        <div style={{padding:"28px 24px",textAlign:"center"}}>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:".12em",textTransform:"uppercase",marginBottom:12,background:"linear-gradient(90deg,#ef4444,#f97316,#eab308)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>Priority</div>
          {focusText
            ? <div style={{fontSize:26,fontWeight:800,color:"#fff",lineHeight:1.25,maxWidth:700,margin:"0 auto"}}>{focusText}</div>

        {focusEditing&&(

                style={{width:"100%",background:"rgba(255,255,255,.08)",border:"1.5px solid rgba(255,255,255,.2)",borderRadius:10,color:"#fff",fontSize:18,fontWeight:700,padding:"14px 16px",outline:"none",resize:"none",lineHeight:1.4,fontFamily:"inherit"}}

                <button onClick={()=>{setFocusText(focusDraft);debouncedSave({pipeline,tasks,quicklinks,focusText:focusDraft,customAreas});setFocusEditing(false);}}

      <div style={{maxWidth:1400,margin:"0 auto 16px"}} className="card">
        <div style={{padding:"14px 18px 10px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".05em",marginBottom:10}}>Progress by Area</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:"8px 16px"}}>

              const done=at.filter(t=>t.status==="DONE").length;

                    <span style={{fontSize:11,fontWeight:600,color:"#475569",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"75%"}}>{area}</span>

          )}

          {tab==="tasks"&&(
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

                <div style={{display:"flex",gap:8}}>
                  <Btn variant="ghost" onClick={()=>{setNewAreaName("");setAddAreaOpen(true);}}>+ New Area</Btn>
                  <Btn onClick={()=>{setTf({area:areas[0]||"N8N",task:"",status:"PENDING",who:"",position:"bottom"});setEditT(null);setAddTOpen(true);}}>+ Add Task</Btn>

                        {t.link&&<a href={t.link.startsWith("http")?t.link:"https://"+t.link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{flexShrink:0,fontSize:11,background:"#EEF2FF",color:"#6366F1",borderRadius:6,padding:"2px 7px",fontWeight:600,textDecoration:"none"}}>🔗 Open</a>}
                      </div>
                      <div style={{fontSize:12,color:"#94A3B8",marginTop:2}}>{t.area} · {t.who}</div>
                    </div>
                    <StatusPill value={t.status} onChange={v=>{const u=tasks.map(x=>x.id===t.id?{...x,status:v}:x);doSaveT(pipeline,u);}}/>
                    <IconBtn onClick={()=>{setTf({area:t.area,task:t.task,status:t.status,who:t.who,link:t.link||"",position:"bottom"});setEditT(t);setAddTOpen(true);}} icon="✏️"/>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>

      {addPOpen&&(
        <Modal title={editP?"Edit Step":"Add Pipeline Step"} onClose={()=>{setAddPOpen(false);setEditP(null);}}>
          <Field label="Title *" value={pf.title} onChange={v=>setPf(f=>({...f,title:v}))} placeholder="e.g. Retargeting Ads"/>
          <Field label="Description" value={pf.desc} onChange={v=>setPf(f=>({...f,desc:v}))} placeholder="What does this step do?" multiline/>
          <Field label="Link (optional)" value={pf.link||""} onChange={v=>setPf(f=>({...f,link:v}))} placeholder="https://..."/>
          <div style={{marginBottom:18}}>
            <label style={{display:"block",fontWeight:600,fontSize:12,color:"#64748B",marginBottom:8,textTransform:"uppercase",letterSpacing:".04em"}}>Status</label>
            <div style={{display:"flex",gap:10}}>
              {["PENDING","DONE"].map(s=>(
                <label key={s} style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:13,fontWeight:pf.done===(s==="DONE")?600:400,color:pf.done===(s==="DONE")?"#6366F1":"#64748B"}}>
                  <input type="radio" checked={pf.done===(s==="DONE")} onChange={()=>setPf(f=>({...f,done:s==="DONE"}))}/> {s}
                </label>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={()=>{setAddPOpen(false);setEditP(null);}}>Cancel</Btn>
            <Btn onClick={submitP}>{editP?"Save Changes":"Add Step"}</Btn>
          </div>
        </Modal>
      )}

      {addTOpen&&(
        <Modal title={editT?"Edit Task":"Add Task"} onClose={()=>{setAddTOpen(false);setEditT(null);}}>
          <FieldSelect label="Area" value={tf.area} onChange={v=>setTf(f=>({...f,area:v,position:"bottom"}))} options={areas}/>
          <Field label="Task *" value={tf.task} onChange={v=>setTf(f=>({...f,task:v}))} placeholder="Describe the task" multiline/>
          <FieldSelect label="Status" value={tf.status} onChange={v=>setTf(f=>({...f,status:v}))} options={STATUS_OPTIONS}/>
          <Field label="Who" value={tf.who} onChange={v=>setTf(f=>({...f,who:v}))} placeholder="e.g. Me, Kasper, Editor"/>
          <Field label="Link (optional)" value={tf.link||""} onChange={v=>setTf(f=>({...f,link:v}))} placeholder="https://docs.google.com/..."/>
          {!editT&&(
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontWeight:600,fontSize:12,color:"#64748B",marginBottom:5,textTransform:"uppercase",letterSpacing:".04em"}}>Position in "{tf.area}"</label>
              <select value={tf.position} onChange={e=>setTf(f=>({...f,position:e.target.value}))}
                style={{width:"100%",padding:"9px 12px",border:"1.5px solid #6366F1",borderRadius:8,fontSize:13,background:"#EEF2FF",color:"#4338CA",outline:"none",fontWeight:500}}>
                {posOpts.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </div>
          )}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={()=>{setAddTOpen(false);setEditT(null);}}>Cancel</Btn>
            <Btn onClick={submitT}>{editT?"Save Changes":"Add Task"}</Btn>
          </div>
        </Modal>
      )}
      {addAreaOpen&&(
        <Modal title="New Area" onClose={()=>setAddAreaOpen(false)}>
          <Field label="Area Name *" value={newAreaName} onChange={setNewAreaName} placeholder="e.g. Client Retention"/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={()=>setAddAreaOpen(false)}>Cancel</Btn>
            <Btn onClick={()=>{
              const name=newAreaName.trim();
              if(!name)return;
              if(!areas.includes(name)){doSaveCA([...customAreas,name]);}
              setAddAreaOpen(false);setNewAreaName("");
              setTab("tasks");setScrollToArea(name);
            }}>Create Area</Btn>
          </div>
        </Modal>
      )}

      {qlOpen&&(
        <Modal title="Manage Quick Links" onClose={()=>{setQlOpen(false);setQlForm({label:"",url:""});}}>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16,maxHeight:340,overflowY:"auto"}}>
            {quicklinks.map(ql=>(
              <div key={ql.id} style={{display:"flex",gap:8,alignItems:"center"}}>
                <input value={ql.label} onChange={e=>doSaveQL(quicklinks.map(x=>x.id===ql.id?{...x,label:e.target.value}:x))}
                  style={{flex:"0 0 140px",padding:"7px 10px",border:"1.5px solid #E2E8F0",borderRadius:8,fontSize:13,outline:"none"}} placeholder="Label"/>
                <input value={ql.url||""} onChange={e=>doSaveQL(quicklinks.map(x=>x.id===ql.id?{...x,url:e.target.value}:x))}
                  style={{flex:1,padding:"7px 10px",border:"1.5px solid #E2E8F0",borderRadius:8,fontSize:13,outline:"none"}} placeholder="https://..."/>
                <button onClick={()=>{if(window.confirm(`Delete "${ql.label}"?`))doSaveQL(quicklinks.filter(x=>x.id!==ql.id));}}
                  style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:16,padding:"4px",flexShrink:0}}>🗑️</button>
              </div>
            ))}
          </div>
          <div style={{borderTop:"1px solid #F1F5F9",paddingTop:12,display:"flex",gap:8,alignItems:"center"}}>
            <input value={qlForm.label} onChange={e=>setQlForm(f=>({...f,label:e.target.value}))}
              style={{flex:"0 0 140px",padding:"7px 10px",border:"1.5px solid #6366F1",borderRadius:8,fontSize:13,outline:"none"}} placeholder="New label"/>
            <input value={qlForm.url||""} onChange={e=>setQlForm(f=>({...f,url:e.target.value}))}
              style={{flex:1,padding:"7px 10px",border:"1.5px solid #6366F1",borderRadius:8,fontSize:13,outline:"none"}} placeholder="https://..."/>
            <Btn onClick={()=>{
              if(!qlForm.label.trim())return;
              doSaveQL([...quicklinks,{id:Math.max(0,...quicklinks.map(x=>x.id))+1,label:qlForm.label,url:qlForm.url||""}]);
              setQlForm({label:"",url:""});
            }}>Add</Btn>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}>
            <Btn onClick={()=>{setQlOpen(false);setQlForm({label:"",url:""});}}>Done</Btn>
          </div>
        </Modal>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
