/* ============================================================
   App
   ============================================================ */
function App() {
  const viewportWidth = useViewportWidth();
  const [themeMode, setThemeMode, resolvedTheme] = useTheme();
  const dark = resolvedTheme === "dark";

  const [ready, setReady] = useState(false);
  const [projects, setProjects] = useState([]);
  const [syncState, setSyncState] = useState("idle"); // idle | saving | saved | error | offline
  const saveTimer = useRef(null);

  const [toasts, setToasts] = useState([]);
  const toastIdRef = useRef(1);
  const requestToast = useCallback(({ msg, action, ttl = 5000, err = false }) => {
    const id = toastIdRef.current++;
    setToasts(prev => [...prev, { id, msg, action, err }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), ttl);
  }, []);
  const dismissToast = useCallback((id) => setToasts(prev => prev.filter(t => t.id !== id)), []);

  const [confirm, setConfirm] = useState(null);
  const requestConfirm = useCallback((c) => setConfirm(c), []);

  const [focusState, setFocusState] = useState(null);
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [highlightItemId, setHighlightItemId] = useState(null);
  const [showArchived, setShowArchived] = useState(false);
  const [activeOwner, setActiveOwner] = useState(() => {
    try { return localStorage.getItem("pc_owner") || "sidney"; }
    catch { return "sidney"; }
  });
  useEffect(() => {
    try { localStorage.setItem("pc_owner", activeOwner); } catch {}
  }, [activeOwner]);
  const [selectedIds, setSelectedIds] = useState(() => new Set());
  const lastSelectedRef = useRef(null);

  const dragState = useState(null);
  const collapsedStore = useCollapsedStore();

  useEffect(() => {
    document.body.setAttribute("data-has-selection", selectedIds.size > 0 ? "true" : "false");
  }, [selectedIds]);

  /* ---- Load ---- */
  useEffect(() => {
    (async () => {
      try {
        const remote = await apiLoad();
        if (remote && remote.length) {
          const norm = remote.map(normalizeProject).sort((a,b)=>a.sortOrder-b.sortOrder);
          setProjects(norm);
          saveLocal(norm);
          setSyncState("saved");
        } else {
          const local = loadLocal();
          if (local && local.length) {
            setProjects(local.map(normalizeProject));
            setSyncState("saved");
          } else {
            setProjects([{ ...emptyProject(), name: "Ai Avatar", sortOrder: 1 }]);
            setSyncState("idle");
          }
        }
      } catch {
        const local = loadLocal();
        if (local && local.length) {
          setProjects(local.map(normalizeProject));
          setSyncState("offline");
          requestToast({ msg: "Working offline — couldn't reach n8n", err: true });
        } else {
          setProjects([{ ...emptyProject(), name: "Ai Avatar", sortOrder: 1 }]);
          setSyncState("offline");
          requestToast({ msg: "Working offline — couldn't reach n8n", err: true });
        }
      }
      setReady(true);
    })();
  }, [requestToast]);

  /* ---- Persist ---- */
  const persist = useCallback((next, { immediate = false } = {}) => {
    saveLocal(next);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setSyncState("saving");
    const flush = async () => {
      try { await apiSave(next); setSyncState("saved"); }
      catch { setSyncState("error"); requestToast({ msg: "Save failed (kept local copy)", err: true }); }
    };
    if (immediate) { flush(); return; }
    saveTimer.current = setTimeout(flush, 900);
  }, [requestToast]);

  const updateProject = useCallback((updated, opts = {}) => {
    setProjects(prev => {
      if (opts.duplicate) {
        const next = [...prev, updated].sort((a,b)=>a.sortOrder-b.sortOrder).map((p,i)=>({...p, sortOrder: i+1}));
        persist(next);
        return next;
      }
      const next = prev.map(p => p.id === updated.id ? updated : p);
      persist(next);
      return next;
    });
  }, [persist]);

  const deleteProject = useCallback((id) => {
    setProjects(prev => {
      const next = prev.filter(p => p.id !== id).map((p,i)=>({...p, sortOrder: i+1}));
      persist(next);
      return next;
    });
  }, [persist]);

  const addProject = useCallback((name = "New project") => {
    setProjects(prev => {
      const np = withOwner({ ...emptyProject(), name, sortOrder: prev.length + 1 }, activeOwner);
      const next = [...prev, np];
      persist(next);
      setTimeout(()=>window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }), 50);
      setTimeout(()=>{
        const el = document.querySelector(`[data-project-id="${np.id}"] .project-name`);
        el?.focus(); el?.select?.();
      }, 80);
      return next;
    });
  }, [persist, activeOwner]);

  /* ---- Drag dispatcher ---- */
  useEffect(() => {
    window.__pcDrop = (target) => {
      const drag = dragState[0];
      if (!drag) return;
      setProjects(prev => {
        const next = JSON.parse(JSON.stringify(prev));
        const findProject = (pid) => next.find(p => p.id === pid);
        const removeItem = (pid, itemId) => {
          const p = findProject(pid); if (!p) return null;
          for (const a of p.areas || []) {
            const idx = a.items.findIndex(i => i.id === itemId);
            if (idx >= 0) return a.items.splice(idx, 1)[0];
          }
          return null;
        };

        if (drag.kind === 'project' && target.targetKind === 'project') {
          if (drag.projectId === target.projectId) return prev;
          const fromIdx = next.findIndex(p => p.id === drag.projectId);
          if (fromIdx < 0) return prev;
          const [m] = next.splice(fromIdx, 1);
          let toIdx = next.findIndex(p => p.id === target.projectId);
          if (toIdx < 0) return prev;
          const insertAt = toIdx + (target.position === 'after' ? 1 : 0);
          next.splice(insertAt, 0, m);
          next.forEach((p,i) => p.sortOrder = i+1);
        }
        else if (drag.kind === 'area' && target.targetKind === 'area') {
          if (drag.projectId !== target.projectId) return prev;
          const p = findProject(drag.projectId);
          const list = p.areas;
          const fromIdx = list.findIndex(a => a.id === drag.areaId);
          if (fromIdx < 0) return prev;
          const [m] = list.splice(fromIdx, 1);
          let toIdx = list.findIndex(a => a.id === target.areaId);
          if (toIdx < 0) return prev;
          const insertAt = toIdx + (target.position === 'after' ? 1 : 0);
          list.splice(insertAt, 0, m);
        }
        else if (drag.kind === 'item') {
          const moved = removeItem(drag.projectId, drag.itemId);
          if (!moved) return prev;
          if (target.targetKind === 'item') {
            const p = findProject(target.projectId);
            const area = (p.areas || []).find(a => a.id === target.areaId);
            if (!area) return prev;
            const idx = area.items.findIndex(i => i.id === target.itemId);
            area.items.splice(idx + (target.position === 'after' ? 1 : 0), 0, moved);
          } else if (target.targetKind === 'area-empty') {
            const p = findProject(target.projectId);
            const area = (p.areas || []).find(a => a.id === target.areaId);
            if (!area) return prev;
            area.items.push(moved);
          }
        }
        persist(next);
        return next;
      });
    };
    return () => { delete window.__pcDrop; };
  }, [persist, dragState]);

  /* ---- Item delete with undo ---- */
  const deleteItemWithUndo = useCallback((projectId, areaId, itemId) => {
    let snapshot = null;
    setProjects(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const p = next.find(x => x.id === projectId); if (!p) return prev;
      const a = p.areas.find(x => x.id === areaId); if (!a) return prev;
      const idx = a.items.findIndex(x => x.id === itemId); if (idx < 0) return prev;
      snapshot = { projectId, areaId, idx, item: a.items[idx] };
      a.items.splice(idx, 1);
      persist(next);
      return next;
    });
    if (snapshot) {
      requestToast({
        msg: "Item deleted",
        action: { label: "Undo", onClick: () => {
          setProjects(prev => {
            const next = JSON.parse(JSON.stringify(prev));
            const p = next.find(x => x.id === snapshot.projectId);
            const a = p?.areas.find(x => x.id === snapshot.areaId);
            if (!a) return prev;
            a.items.splice(snapshot.idx, 0, snapshot.item);
            persist(next);
            return next;
          });
        } },
      });
    }
  }, [persist, requestToast]);

  /* ---- Per-item actions: copy link, duplicate, move ---- */
  const copyItemLink = useCallback((itemId) => {
    const url = window.location.href.replace(/#.*$/, "") + "#" + itemId;
    const fallback = () => requestToast({ msg: "Couldn't copy — link: " + url, err: true });
    try {
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(url).then(
          () => requestToast({ msg: "Link copied" }),
          fallback
        );
      } else { fallback(); }
    } catch { fallback(); }
  }, [requestToast]);

  const duplicateItem = useCallback((projectId, areaId, itemId) => {
    setProjects(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const p = next.find(x => x.id === projectId); if (!p) return prev;
      const a = p.areas.find(x => x.id === areaId); if (!a) return prev;
      const idx = a.items.findIndex(x => x.id === itemId); if (idx < 0) return prev;
      const src = a.items[idx];
      const dup = { ...src, id: gid("i"), updatedAt: nowISO() };
      a.items.splice(idx + 1, 0, dup);
      persist(next);
      return next;
    });
  }, [persist]);

  const moveItem = useCallback((projectId, areaId, itemId, targetProjectId, targetAreaId) => {
    let targetAreaName = "";
    let targetProjectName = "";
    setProjects(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const sp = next.find(x => x.id === projectId);
      const sa = sp?.areas.find(x => x.id === areaId);
      const tp = next.find(x => x.id === targetProjectId);
      const ta = tp?.areas.find(x => x.id === targetAreaId);
      if (!sa || !ta) return prev;
      const idx = sa.items.findIndex(x => x.id === itemId);
      if (idx < 0) return prev;
      const [moved] = sa.items.splice(idx, 1);
      moved.updatedAt = nowISO();
      ta.items.push(moved);
      targetAreaName = ta.name;
      targetProjectName = tp.name;
      persist(next);
      return next;
    });
    if (targetAreaName) {
      requestToast({ msg: `Moved to ${targetAreaName} · ${targetProjectName}` });
    }
  }, [persist, requestToast]);

  /* ---- Multi-select bulk ops ---- */
  const itemOrder = useMemo(() => {
    const order = [];
    for (const p of projects) for (const a of (p.areas||[])) for (const it of (a.items||[])) {
      order.push(it.id);
    }
    return order;
  }, [projects]);

  const toggleSelect = useCallback((itemId, ev) => {
    const range = ev && ev.shiftKey;
    setSelectedIds(prev => {
      const next = new Set(prev);
      let didRange = false;
      if (range && lastSelectedRef.current && lastSelectedRef.current !== itemId) {
        const a = itemOrder.indexOf(lastSelectedRef.current);
        const b = itemOrder.indexOf(itemId);
        if (a >= 0 && b >= 0) {
          const [lo, hi] = a < b ? [a, b] : [b, a];
          for (let i = lo; i <= hi; i++) next.add(itemOrder[i]);
          didRange = true;
        }
      }
      if (!didRange) {
        if (next.has(itemId)) next.delete(itemId); else next.add(itemId);
      }
      lastSelectedRef.current = itemId;
      return next;
    });
  }, [itemOrder]);

  // Prune selectedIds + lastSelectedRef when items disappear (delete/move/area-delete/project-delete).
  useEffect(() => {
    const live = new Set();
    for (const p of projects) for (const a of (p.areas||[])) for (const it of (a.items||[])) live.add(it.id);
    setSelectedIds(prev => {
      if (prev.size === 0) return prev;
      let changed = false;
      const next = new Set();
      for (const id of prev) {
        if (live.has(id)) next.add(id); else changed = true;
      }
      return changed ? next : prev;
    });
    if (lastSelectedRef.current && !live.has(lastSelectedRef.current)) {
      lastSelectedRef.current = null;
    }
  }, [projects]);

  const clearSelection = useCallback(() => {
    setSelectedIds(new Set());
    lastSelectedRef.current = null;
  }, []);

  const bulkMutate = useCallback((mutator) => {
    setProjects(prev => {
      const ids = selectedIds;
      const stamp = nowISO();
      const next = prev.map(p => ({
        ...p,
        areas: (p.areas||[]).map(a => ({
          ...a,
          items: (a.items||[]).map(it => ids.has(it.id) ? { ...mutator(it), updatedAt: stamp } : it)
        }))
      }));
      persist(next);
      return next;
    });
  }, [selectedIds, persist]);

  const bulkDelete = useCallback(() => {
    const ids = selectedIds;
    if (!ids.size) return;
    const prevSelection = new Set(ids);
    const prevLast = lastSelectedRef.current;
    let snapshots = [];
    setProjects(prev => {
      const next = prev.map(p => ({
        ...p,
        areas: (p.areas||[]).map(a => {
          const kept = [];
          (a.items||[]).forEach((it, idx) => {
            if (ids.has(it.id)) snapshots.push({ projectId: p.id, areaId: a.id, idx, item: it });
            else kept.push(it);
          });
          return { ...a, items: kept };
        })
      }));
      persist(next);
      return next;
    });
    clearSelection();
    if (snapshots.length) {
      requestToast({
        msg: `${snapshots.length} item${snapshots.length===1?"":"s"} deleted`,
        action: { label: "Undo", onClick: () => {
          setProjects(prev => {
            const next = JSON.parse(JSON.stringify(prev));
            for (const snap of snapshots) {
              const p = next.find(x => x.id === snap.projectId);
              const a = p?.areas.find(x => x.id === snap.areaId);
              if (a) a.items.splice(Math.min(snap.idx, a.items.length), 0, snap.item);
            }
            persist(next);
            return next;
          });
          setSelectedIds(prevSelection);
          lastSelectedRef.current = prevLast;
        } },
      });
    }
  }, [selectedIds, persist, requestToast, clearSelection]);

  /* ---- Keyboard shortcuts ---- */
  useEffect(() => {
    const onKey = (e) => {
      const meta = e.metaKey || e.ctrlKey;
      if (meta && e.key === "k") { e.preventDefault(); setPaletteOpen(true); }
      else if (meta && e.key === "s") {
        e.preventDefault();
        if (saveTimer.current) clearTimeout(saveTimer.current);
        setProjects(prev => { persist(prev, { immediate: true }); return prev; });
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [persist]);

  /* ---- Hash-scroll on initial load (for shared item links) ---- */
  const didHashScroll = useRef(false);
  useEffect(() => {
    if (!ready || didHashScroll.current) return;
    const hash = (window.location.hash || "").replace(/^#/, "");
    if (!hash) return;
    didHashScroll.current = true;
    setTimeout(() => {
      const el = document.querySelector(`[data-item-id="${hash}"], [data-area-id="${hash}"], [data-project-id="${hash}"]`);
      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        el.classList.add("highlight-flash");
        setTimeout(() => el.classList.remove("highlight-flash"), 1700);
      }
    }, 120);
  }, [ready]);

  /* ---- Palette jump ---- */
  const jumpTo = useCallback((r) => {
    setTimeout(() => {
      let selector;
      if (r.itemId)      selector = `[data-item-id="${r.itemId}"]`;
      else if (r.areaId) selector = `[data-area-id="${r.areaId}"]`;
      else               selector = `[data-project-id="${r.projectId}"]`;
      const el = document.querySelector(selector);
      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        if (r.itemId) {
          setHighlightItemId(r.itemId);
          setTimeout(() => setHighlightItemId(null), 1700);
        }
      }
    }, 50);
  }, []);

  /* ---- Render ---- */
  const selectionCtxValue = useMemo(() => ({
    has: (id) => selectedIds.has(id),
    toggle: toggleSelect,
    clear: clearSelection,
    count: selectedIds.size,
  }), [selectedIds, toggleSelect, clearSelection]);

  // Keep projects + active-owner accessible via a ref so the context value
  // stays referentially stable across edits — otherwise every project
  // mutation would force every ItemRow (which consumes ItemOpsCtx) to
  // re-render. Consumers that need the live, owner-scoped list should call
  // itemOps.getProjects().
  const projectsRef = useRef(projects);
  const activeOwnerRef = useRef(activeOwner);
  useEffect(() => { projectsRef.current = projects; }, [projects]);
  useEffect(() => { activeOwnerRef.current = activeOwner; }, [activeOwner]);

  const itemOpsCtxValue = useMemo(() => ({
    copyLink: copyItemLink,
    duplicate: duplicateItem,
    move: moveItem,
    getProjects: () => projectsRef.current.filter(p => ownerOf(p) === activeOwnerRef.current),
  }), [copyItemLink, duplicateItem, moveItem]);

  const ownerSuggestionsAll = useMemo(() => {
    const s = new Set();
    for (const p of projects) for (const a of (p.areas||[])) for (const it of (a.items||[])) {
      if (it.owner) s.add(it.owner);
    }
    return Array.from(s);
  }, [projects]);

  if (viewportWidth < 1024) return <MobileGate/>;

  if (!ready) return (
    <div className="loading"><div className="spinner"/>Loading…</div>
  );

  const exportJson = () => {
    const blob = new Blob([JSON.stringify(projects, null, 2)], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `project-central-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const syncLabel = {
    idle: "Ready", saving: "Saving…", saved: "Saved", error: "Save failed", offline: "Offline",
  }[syncState] || "Ready";

  return (
    <DragCtx.Provider value={dragState}>
    <CollapsedCtx.Provider value={collapsedStore}>
    <SelectionCtx.Provider value={selectionCtxValue}>
    <ItemOpsCtx.Provider value={itemOpsCtxValue}>
      <div className="page">
        <header className="topbar">
          <div className="topbar-title">
            <h1>Central Board</h1>
            <span className="topbar-sub">
              <span className={`sync-dot ${syncState === "saving" ? "saving" : syncState === "saved" ? "saved" : syncState === "error" ? "error" : ""}`}/>
              {syncLabel} · {projects.length} project{projects.length===1?"":"s"}
            </span>
          </div>
          <div className="topbar-actions">
            <button type="button" className="btn" onClick={()=>setPaletteOpen(true)} title="Quick find (⌘K)">
              Search <span style={{fontSize:10.5, color:"var(--text-faint)", marginLeft:4}}>⌘K</span>
            </button>
            <ThemeToggle mode={themeMode} setMode={setThemeMode}/>
            <button type="button" className="btn" onClick={exportJson} title="Export as JSON">
              <Icon.Download/>
            </button>
            <a className="btn" href={SHEET_URL} target="_blank" rel="noreferrer" title="Open sheet">
              <Icon.Sheet/>
            </a>
            <button type="button" className="btn btn-primary" onClick={()=>addProject()}>
              <Icon.Plus/> Add Project
            </button>
          </div>
        </header>

        <div className="user-tabs" role="tablist" aria-label="Board owner">
          {USERS.map(u => (
            <button key={u.id} type="button"
              className="user-tab"
              role="tab"
              aria-selected={activeOwner === u.id}
              onClick={()=>setActiveOwner(u.id)}>
              {u.label}
            </button>
          ))}
        </div>

        {(() => {
          const mine = projects.filter(p => ownerOf(p) === activeOwner);
          const archivedCount = mine.filter(p => p.archived).length;
          const visible = showArchived ? mine : mine.filter(p => !p.archived);
          const currentLabel = USERS.find(u => u.id === activeOwner)?.label || activeOwner;
          if (mine.length === 0) {
            return (
              <div className="empty-state">
                <h2>{currentLabel}'s board is empty</h2>
                <p>Create the first project for this board to start tracking work.</p>
                <button type="button" className="btn btn-primary" onClick={()=>addProject()}>
                  <Icon.Plus/> Add Project
                </button>
              </div>
            );
          }
          return (
            <>
              <div className="project-list">
                {visible.map(p => (
                  <ProjectCard key={p.id} project={p} dark={dark}
                    focusState={focusState} setFocusState={setFocusState}
                    requestConfirm={requestConfirm}
                    requestToast={requestToast}
                    onChange={updateProject}
                    onDelete={deleteProject}
                    onDeleteItem={deleteItemWithUndo}
                  />
                ))}
              </div>
              {archivedCount > 0 && (
                <div style={{ textAlign: "center", marginTop: 24 }}>
                  <button type="button" className="btn"
                    style={{ color: "var(--text-muted)" }}
                    onClick={()=>setShowArchived(s=>!s)}>
                    <Icon.Archive/>
                    {showArchived ? `Hide archived (${archivedCount})` : `Show ${archivedCount} archived`}
                  </button>
                </div>
              )}
            </>
          );
        })()}

        <ToastHost toasts={toasts} dismiss={dismissToast}/>
        {confirm && (
          <ConfirmDialog
            title={confirm.title}
            message={confirm.message}
            onConfirm={()=>{ confirm.onConfirm(); setConfirm(null); }}
            onCancel={()=>setConfirm(null)}
          />
        )}
        {paletteOpen && (
          <CommandPalette
            projects={projects.filter(p => ownerOf(p) === activeOwner)}
            onClose={()=>setPaletteOpen(false)}
            onAddProject={(name)=>addProject(name)}
            onJump={jumpTo}
          />
        )}
        {selectedIds.size > 0 && (
          <BulkActionBar
            count={selectedIds.size}
            ownerSuggestions={ownerSuggestionsAll}
            dark={dark}
            onBulkStatus={(s)=>bulkMutate(it => ({ ...it, status: s }))}
            onBulkOwner={(o)=>bulkMutate(it => ({ ...it, owner: o }))}
            onBulkDue={(d)=>bulkMutate(it => ({ ...it, dueDate: d }))}
            onBulkDelete={bulkDelete}
            onClear={clearSelection}
          />
        )}
      </div>
    </ItemOpsCtx.Provider>
    </SelectionCtx.Provider>
    </CollapsedCtx.Provider>
    </DragCtx.Provider>
  );
}

/* ============================================================
   Error Boundary — converts render-time crashes (the classic
   black-screen-after-loading) into a readable error card with
   the actual error message, stack trace, and a reload button.
   ============================================================ */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) {
    this.setState({ info });
    try { console.error("Central Board render crash:", error, info); } catch {}
  }
  render() {
    if (!this.state.error) return this.props.children;
    const msg = this.state.error?.message || String(this.state.error);
    const stack = this.state.info?.componentStack || this.state.error?.stack || "";
    return (
      <div style={{
        maxWidth: 720, margin: "60px auto", padding: 28,
        background: "var(--surface, #fff)", color: "var(--text, #1A1A19)",
        border: "1px solid var(--border, #E5E5E5)", borderRadius: 16,
        fontFamily: "ui-sans-serif, -apple-system, sans-serif",
        boxShadow: "0 12px 40px rgba(0,0,0,.08)",
      }}>
        <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>Something broke while rendering.</div>
        <div style={{ fontSize: 13, color: "var(--text-muted, #666)", marginBottom: 16 }}>
          Your data is safe — this is a UI crash, not a save failure. Reload to try again.
        </div>
        <pre style={{
          background: "var(--surface-elev, #F6F6F6)", padding: 12, borderRadius: 8,
          fontSize: 12, fontFamily: "ui-monospace, SFMono-Regular, monospace",
          whiteSpace: "pre-wrap", wordBreak: "break-word", overflow: "auto", maxHeight: 200,
          margin: 0, marginBottom: 16,
        }}>{msg}</pre>
        {stack && (
          <details style={{ marginBottom: 16 }}>
            <summary style={{ cursor: "pointer", fontSize: 12, color: "var(--text-muted, #666)" }}>Component stack</summary>
            <pre style={{
              fontSize: 11, fontFamily: "ui-monospace, monospace",
              whiteSpace: "pre-wrap", marginTop: 8, color: "var(--text-muted, #666)",
            }}>{stack}</pre>
          </details>
        )}
        <div style={{ display: "flex", gap: 8 }}>
          <button type="button" onClick={() => window.location.reload()}
            style={{
              padding: "8px 16px", borderRadius: 8, border: 0,
              background: "var(--accent, #6B5BFF)", color: "#fff",
              fontWeight: 600, fontSize: 13, cursor: "pointer",
            }}>Reload</button>
          <button type="button" onClick={() => this.setState({ error: null, info: null })}
            style={{
              padding: "8px 16px", borderRadius: 8,
              background: "transparent", color: "var(--text-muted, #666)",
              border: "1px solid var(--border, #E5E5E5)",
              fontWeight: 600, fontSize: 13, cursor: "pointer",
            }}>Try again without reload</button>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
